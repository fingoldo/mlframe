[build-system]
requires = ["setuptools>=78.1.1,<82", "wheel"]  # PYSEC-2025-49 fixed in 78.1.1; torch pins setuptools<82
build-backend = "setuptools.build_meta"

[project]
name = "mlframe"
dynamic = ["version"]
description = "Production-grade machine learning framework for tabular data: training pipelines, feature engineering & selection, ensembling, calibration, ranking, and quantile regression."
authors = [{name = "Anatoly Alexeev", email = "fingoldo@gmail.com"}]
license = "MIT"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.9"
keywords = [
    "machine-learning",
    "scikit-learn",
    "catboost",
    "lightgbm",
    "xgboost",
    "feature-engineering",
    "feature-selection",
    "ensembling",
    "calibration",
    "ranking",
    "quantile-regression",
    "tabular",
    "automl",
    "polars",
    "gpu",
    "shap",
    "mrmr",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

# Minimal hard requirements so `pip install mlframe` stays light.
# Domain-specific stacks (catboost / lightgbm / shap / mlflow / ...) ship as extras.
dependencies = [
    # Upper cap <2.5: numba 0.65.1 (latest) rejects numpy 2.5 at import ("Numba needs NumPy 2.4 or less").
    # pip honours this (it ignores [tool.uv].override-dependencies, which carries the matching cap for uv).
    "numpy>=1.23,<2.5",
    "pandas>=1.5",
    "polars>=0.20",
    "scipy>=1.10",
    # >=1.6: category-encoders (a hard dep below) imports ``sklearn.utils.Tags``, which only exists from
    # sklearn 1.6; on older sklearn ``import category_encoders`` fails, so 1.6 is mlframe's effective floor.
    "scikit-learn>=1.6",
    # >=25.0.0: pyarrow 24.0.0's cp314 wheel segfaults (Windows access violation) on import when
    # triggered through pytest's assertion-rewrite loader (reproduces in tests/conftest.py's
    # pyutilz.system -> pyutilz.text.strings -> pandas.compat.pyarrow -> pyarrow import chain; a
    # plain `python -c "import pyarrow"` does NOT crash, only the pytest-loader path does).
    # Confirmed via an isolated venv A/B: 24.0.0 crashes reproducibly (3/3), 25.0.0 is stable (3/3).
    "pyarrow>=25.0.0",
    "joblib>=1.2",
    "tqdm>=4.65",
    "pydantic>=2.0",
    "portalocker>=2.7",
    "dill>=0.3.6",
    "orjson>=3.9",
    "numba>=0.59",  # numpy-2-compatible floor (numba <0.59 is built against the numpy 1.x ABI)
    "psutil>=5.9",
    "matplotlib>=3.7",
    # Not imported directly; floors matplotlib's own transitive pillow resolution above the
    # patched version for CVE-2026-25990/40192/42309/42310/42311 (PYSEC-2026-165).
    "pillow>=12.2.0",
    # The four below are imported UNCONDITIONALLY at module load time across
    # src/mlframe/{feature_engineering/numerical,feature_selection/filters/*}
    # and would otherwise raise ImportError on `import mlframe`. Audited via
    # AST top-level scan on 2026-05-15.
    "antropy>=0.1.4",
    # 2026-05-28: astropy removed from CORE deps. Native impls of Bayesian Blocks
    # (Scargle 2013) and Knuth's rule (Knuth 2006) ship in
    # feature_selection/filters/discretization.py:histogram(). All consumers
    # (feature_engineering/numerical.py, _numerical_numba.py,
    # feature_selection/filters/_mrmr_fingerprints.py) wrap the astropy import
    # in try/except with np.histogram fallback, so removing astropy from core
    # only loses the optional astropy-only bin schemes. Listed in [signal]
    # extras below for callers who want them.
    "category-encoders>=2.6",
    "expiringdict>=1.2",
    "pympler>=1.0",   # used via pyutilz.system; unconditional import in tests/feature_engineering/*
    # 2026-07-17: promoted from an optional/best-effort import to a hard dep. Used directly for fast
    # copy-free content hashing on several hot per-column dedup paths (_fe_resident_operands.py's
    # resident-operand cache, _mrmr_degenerate.py's audit_degenerate_columns, discretization's
    # per-column code cache) -- measured 1.4-2.6x over the pandas/hashlib fallbacks those paths still
    # carry (kept as defensive degradation, not exercised once this floor is guaranteed present).
    "xxhash>=3.0",
    # pyutilz is not yet on PyPI. Install it from GitHub before mlframe:
    #   pip install "pyutilz @ git+https://github.com/fingoldo/pyutilz.git@0ba0748c1062fe8d1a063ff2e5615091a167d214"
    # X_SECURITY_API_PACKAGING-5 fix (mrmr_audit_2026-07-22): pin to a specific commit SHA, not the
    # floating default branch -- an unpinned, same-day pyutilz commit once silently flipped a shared
    # helper's default argument and broke MRMR.fit() for every caller (CORE_CLASS-1), with no version
    # boundary anywhere in this dependency graph that could have caught or rolled back the change.
    # Bump the SHA deliberately (with a CHANGELOG entry) when a new pyutilz feature is actually needed.
    # The version specifier below works once pyutilz is published; until then,
    # pip needs to resolve pyutilz from the user's environment (already installed).
    "pyutilz>=1.0.0",
    # numpy<2 on Python 3.9 only: the sole 3.9-compatible astropy (5.x, pulled by [signal]/[all]) is built
    # against the numpy 1.x ABI and no numpy-2-ready astropy supports 3.9, so numpy 2.x there breaks every
    # astropy C-extension import. Mirrored in [tool.uv].override-dependencies so plain pip honours it too.
    "numpy<2.0; python_version < '3.10'",
]

# uv-specific resolver overrides. Honored by `uv pip install` (verified with
# uv 0.11) as well as `uv lock`/`uv sync`.
[tool.uv]
# optbinning 0.21.0 (latest) conservatively pins ortools>=9.4,<9.12, but ortools
# ships cp313/cp314 wheels only from 9.12+ — so the unpatched cap makes the [all]
# extra uninstallable on Python 3.13/3.14. optbinning is pure-Python and its
# CP-SAT solver path was verified working against ortools 9.15 on py3.14
# (OptimalBinning(solver="cp") -> status OPTIMAL), so the cap is purely
# conservative. Override it to the cp313/cp314-capable line; ortools 9.12-9.15
# all still publish cp39-cp312 wheels, so this is safe across the whole matrix.
#
# numpy<2 on Python 3.9: the only 3.9-compatible astropy (5.x, pulled by [signal]/[all])
# is built against the numpy 1.x ABI, and no numpy-2-ready astropy supports 3.9 (6.1+ needs
# 3.10+). With numpy 2.x resolved on 3.9 every astropy C-extension import raises
# "ValueError: numpy.dtype size changed ... binary incompatibility", cascading into thousands
# of collection failures. Pinning numpy<2 on 3.9 only (3.10+ keep numpy 2.x) restores the
# numpy-1 ABI world the whole 3.9 C-extension stack (astropy/numba 0.60/pyarrow) was built for.
override-dependencies = [
    "ortools>=9.12",
    # An override-dependencies entry REPLACES a package's resolved constraints. With ONLY the py<3.10 numpy
    # entry, on py>=3.10 its marker is False, leaving numpy with zero active override entries -- uv then treats
    # numpy as overridden-to-nothing and PRUNES it from the resolution entirely (pandas/sklearn install, numpy
    # does not -> ModuleNotFoundError at import). The complementary py>=3.10 entry keeps numpy constrained
    # (>= the declared floor) on every interpreter, so it is never pruned. py3.9 still gets the numpy<2 ABI pin.
    # Upper cap <2.5: numba 0.65.1 (latest, the only line with py3.13/3.14 wheels) rejects numpy 2.5 at import
    # ("Numba needs NumPy 2.4 or less"); without the cap the resolver pulls numpy 2.5 and every numba import dies.
    "numpy<2.0; python_version < '3.10'",
    "numpy>=1.23,<2.5; python_version >= '3.10'",
]

[project.optional-dependencies]
# Gradient-boosting backends used by the training pipeline.
boosting = [
    "catboost>=1.2",
    "lightgbm>=4.0",
    "xgboost>=2.0",
]

# Calibration + uncertainty + interpretability stack.
# pycalib is dev-only on PyPI (no stable 0.1.0 release as of 2026-05-15);
# we permit pre-releases via dev0 floor + post-release matching.
calibration = [
    "shap>=0.44",
    "venn-abers>=1.4",
    "netcal>=1.3",
    "betacal>=1.1",
    "pycalib>=0.1.0.dev0",
    "uncertainty-calibration>=0.1",
    "properscoring>=0.1",
]

# Neural-network training stack (PyTorch + Lightning).
# `lightning` is the canonical post-2.0 distribution name and the only one we
# depend on: every neural module imports `lightning`/`lightning.pytorch`, with
# `pytorch_lightning` used purely as a defensive fallback for users who happen
# to have that legacy re-export installed. We deliberately do NOT pin
# `pytorch-lightning` here — installing both is redundant and invites
# version-skew warnings (`lightning` already vendors the same code).
# `captum` powers the native NN feature-importance path
# (``_captum_integrated_gradients_importance`` in evaluation.py);
# 2026-05-26 bench matched permutation recall@10=1.00 with a ~5x
# speedup on the 500-feature scenario. Optional within the neural
# extras: when absent ``get_model_feature_importances`` falls back
# to permutation (which is always available via sklearn).
neural = [
    # Keep torch on a CUDA-12.x build (``+cu12x``) to match cupy-cu12x + the system CUDA 12.9 / numba.
    # A ``+cu130`` build loads cudart/cublas 13 native libs that COLLIDE with the cu12 ecosystem in one
    # process -> hard native crashes (heap corruption / cublas INVALID_VALUE) even on CPU inference. On
    # Python 3.14 only nightly wheels exist; install from the cu128 index, NOT the default cu130 nightly:
    #   pip install --pre torch torchvision --index-url https://download.pytorch.org/whl/nightly/cu128
    "torch>=2.0",
    "lightning>=2.0",
    "captum>=0.7",
    # Not imported directly; floors torch's own transitive setuptools resolution above the
    # patched version for PYSEC-2025-49 (torch itself caps setuptools<82).
    "setuptools>=78.1.1,<82",
    # Frozen text-embedding path for neural models (HuggingFaceProvider: AutoTokenizer + AutoModel -> pooled vectors).
    "transformers>=4.30",
    # transformers >=5 builds the fast (Rust) tokenizer and converts slow tokenizers via sentencepiece;
    # required for sentencepiece-based embedders (T5/mT5/XLM-R/ALBERT/...) or every from_pretrained raises
    # "Couldn't instantiate the backend tokenizer ... need sentencepiece or tiktoken".
    "sentencepiece>=0.1.99",
]

# AutoML + hyperparameter optimization.
automl = [
    "flaml>=2.0",
]

# Feature-engineering generators: PySR (symbolic regression) discovers
# polynomial/algebraic features; optbinning emits WoE / monotonic-binned
# encodings. Both are used by ``preprocessing_extensions_config`` /
# ``MRMR.fe_max_steps`` paths -- they belong with feature engineering,
# not with AutoML hyperparameter search.
# ``cma`` powers the default Hermite-FE pair optimiser
# (``_hermite_fe_optimise_pair.optimise_hermite_pair(optimizer='cma')``)
# and its ``cma_batch`` variant; without it the dispatcher silently
# returns ``None`` and downstream FE skips engineered candidates.
# ``optuna`` backs the legacy TPE optimiser path (``optimizer='optuna'``)
# kept for benchmark comparisons in tests/feature_selection/
# test_biz_val_filters_hermite_fe.py and as a fallback hint in the
# error message.
feature_engineering = [
    "pysr>=0.18",
    "optbinning>=0.21",  # 0.20.x calls sklearn check_array(force_all_finite=...), removed in sklearn 1.6+; 0.21 uses ensure_all_finite
    "cma>=3.2",
    "optuna>=3.0",
    "holidays>=0.100",  # country/locale-aware holiday calendars (holiday_calendar_features).
    "rapidfuzz>=3.0",  # C++ edit-distance backend for fuzzy_entity_group_features(fuzzy_key_matching=True).
]

# Resampling, encoding, stratification.
sampling = [
    "imbalanced-learn>=0.11",
    "iterative-stratification>=0.1.7",
]

# Polars stack: extras on top of the core polars dep (TA-Lib, DS helpers).
# Polars itself is a hard requirement and lives in [project].dependencies.
polars_ext = [
    "polars-talib>=0.1",
    "polars-ds>=0.4",
]

# Plotting and dashboards.
# ``ipywidgets`` is pulled in for CatBoost's MetricVisualizer (the ``plot=True``
# code path lazy-loads ``ipywidgets`` and re-raises ImportError when it's
# missing -- triggered transitively even when mlframe sets plot=False, on
# certain CB minor builds). Pinning here keeps the windows CI runner from
# failing on ``ModuleNotFoundError: No module named 'ipywidgets'`` inside
# ``catboost/widget/ipythonwidget.py``.
viz = [
    "plotly>=5.15",
    "seaborn>=0.13",
    "altair>=5.0",
    "hvplot>=0.9",
    "vegafusion[embed]>=1.5",
    "vl-convert-python>=1.0",
    "ipywidgets>=8.0",
    # Not imported directly; floors hvplot -> bokeh's transitive tornado resolution above the
    # patched version for GHSA-pw6j-qg29-8w7f.
    "tornado>=6.5.7",
]

# Experiment tracking.
mlflow = [
    "mlflow>=2.5",
    # Not imported directly; float mlflow's own transitive pins above patched versions:
    # aiohttp (PYSEC-2026-237 + CVE-2026-54273/74/76/77/78/79/80), cryptography (GHSA-537c-gmf6-5ccf),
    # starlette, pulled via mlflow-skinny (PYSEC-2026-248/249).
    "aiohttp>=3.14.1",
    "cryptography>=49.0.0,<50",  # mlflow itself caps cryptography<49
    "starlette>=1.3.1",
]

# Database and storage backends.
db = [
    "sqlalchemy>=2.0",
    "psycopg2-binary>=2.9",
    "pymongo>=4.5",
    "duckdb>=0.9",
    "zstandard>=0.21",
]

# Signal-processing / scientific extras (entropy, wavelets, astropy). antropy is NOT listed here --
# it's already a hard core dependency (see [project.dependencies] above), so re-listing it here would
# misleadingly imply it's opt-in.
signal = [
    "astropy>=5.3",
    "entropy-estimators>=0.0.1",
    "pywavelets>=1.4",
    "ruptures>=1.1",
]

# Dimensionality reduction and clustering.
unsupervised = [
    "hdbscan>=0.8.33",
    "umap-learn>=0.5",
]

# Classical statistics.
stats = [
    "statsmodels>=0.14",
]

# GPU acceleration (CuPy). The CuPy wheel is CUDA-major-specific, so pick the extra matching your CUDA toolkit:
#   - mlframe[gpu]  / mlframe[gpu-cuda12]  -> CUDA 12.x (Python 3.10-3.14). cuda12x wheel + [ctk] (bundled
#     NVRTC/ptxas/nvvm/headers) so it runtime-compiles with no system CUDA toolkit; nvcc-cu12 adds ptxas/nvvm/
#     libdevice for numba.cuda.
#   - mlframe[gpu-cuda11]                  -> CUDA 11.x. NOTE: cupy ships cuda11x wheels only through cupy 13.x on
#     Python <=3.12; there is NO cuda11x wheel for Python 3.13+/cupy 14, so CUDA-11 is supported on Python <=3.12.
# The mlframe code itself uses only long-stable CuPy APIs (RawKernel/ReductionKernel/cuda.runtime/einsum/...) and
# numba.cuda (>=CUDA 11.2), so nothing here requires CUDA 12 -- the constraint is purely wheel availability.
# CUDA-11 / non-NVIDIA users stay on CPU (these extras are opt-in).
gpu = [
    "cupy-cuda12x[ctk]>=14.0,<15.0",
    "nvidia-cuda-nvcc-cu12>=12.9",
    "gpu-info>=0.1",
]
gpu-cuda12 = ["mlframe[gpu]"]
gpu-cuda11 = [
    "cupy-cuda11x>=12.0,<14.0",
    "nvidia-cuda-nvcc-cu11>=11.8",
    "gpu-info>=0.1",
]

# Transformer-style FE subpackage extras (see mlframe.feature_engineering.transformer).
# - transformer:       core CPU-only path; numba is already a hard dep, this is a marker for users wanting just the CPU blocks.
# - transformer_ann:   row-attention ANN backend (hnswlib).
# - transformer_gpu:   GPU acceleration on the two stages that win (RFF matmul + row-attention stage-4 fused RawKernel).
# - transformer_full:  ANN + GPU.
# cuVS / cagra is intentionally NOT in extras; no Windows wheel exists. WSL2/Linux users install manually via
# `mamba install -c rapidsai -c conda-forge cuvs` if they want GPU ANN.
transformer = []
transformer_ann = [
    # pynndescent is the default ANN backend (numpy 2 compatible, no C extension, Windows-safe).
    # hnswlib was the original choice; its wheels on Windows + numpy 2 segfault at import (built against numpy 1.x). Users with a working hnswlib can opt in
    # via the `ann_backend="hnswlib"` parameter but it's not in the extra to avoid surprise installs of a broken wheel.
    "pynndescent>=0.5",
]
# cupy window kept identical to the `gpu` extra (same lower bound + `[ctk]`
# bundled CUDA libs) so `mlframe[gpu,transformer_gpu]` resolves without a
# conflicting intersection and both paths runtime-compile against the same libs.
transformer_gpu = [
    "cupy-cuda12x[ctk]>=14.0,<15.0",
]
# CUDA-11 variant (Python <=3.12 only -- no cuda11x wheel for cupy 14 / Python 3.13+).
transformer_gpu_cuda11 = [
    "cupy-cuda11x>=12.0,<14.0",
]
transformer_full = [
    "mlframe[transformer_ann,transformer_gpu]",
]

# Convenience meta-extra: union of all runtime extras (CPU only; GPU via [gpu]
# / [transformer_gpu], docs via [docs], dev tooling via [dev] are intentionally
# excluded since they are not runtime concerns). mlflow is ALSO excluded: every
# mlflow release (including current prereleases) caps pyarrow<25, while this
# project requires pyarrow>=25.0.0 (see that constraint's own comment -- a
# real cp314/Windows import crash on pyarrow 24.0.0) -- no mutually
# satisfiable version pair currently exists. Install mlflow support
# separately via `mlframe[mlflow]` if you need it and can tolerate an older
# pyarrow.
all = [
    "mlframe[boosting,calibration,neural,automl,feature_engineering,sampling,polars_ext,viz,db,signal,unsupervised,stats,transformer_ann]",
]

# Documentation site (MkDocs Material). Build with `mkdocs build` / serve with `mkdocs serve`.
docs = [
    "mkdocs-material>=9.5",
    "mkdocs-jupyter>=0.24",
]

# Development tooling.
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pytest-xdist>=3.0",
    "pytest-timeout>=2.1",
    "pytest-benchmark>=4.0",
    "pytest-order>=1.2",          # pytest.mark.order(index=N) in tests/training/test_biz_val_training_core.py
    "pytest-randomly>=3.0",       # local-dev shuffle plugin. CI workflows disable it via `-p no:randomly` (see .github/workflows/*.yml) - local runs exercise random-order ordering to surface state-leak bugs, CI runs deterministic so flake triage stays clean.
    "pytest-instafail>=0.5",      # --instafail: streams tracebacks immediately on failure so worker-death INTERNALERRORs don't swallow the FAILURES section
    "pytest-rerunfailures>=13.0", # --reruns N --only-rerun <pattern>: re-queues xdist worker crashes / transient CUDA-context failures onto a (possibly restarted) worker instead of a one-shot FAILED; scope --only-rerun to known transient signatures so a genuine deterministic bug is never silently retried into passing.
    "pytest-progress>=1.3",       # --show-progress: prints [NN%] [N/Total] prefix on each test result line so long xdist runs surface percent-complete instead of opaque per-line PASSED chatter
    "pytest-split>=0.8",          # --splits/--group: shard the suite across parallel CI jobs (21k+ tests overflow a single 2-core runner's 90-min cap, see .github/workflows/ci.yml)
    "coverage>=7.2",
    "hypothesis>=6.80",
    "freezegun>=1.2",             # frozen-time fixtures in tests/perf and tests/training calibration suites
    "ruff==0.15.20",               # pinned exact, matching .pre-commit-config.yaml's ruff-pre-commit rev AND
                                    # CI's `uvx ruff==0.15.20` (ruff-blocking.yml) -- an open range here is
                                    # exactly how the prior v0.8.6 pre-commit-vs-CI drift went unnoticed (2026-07-18).
    # black==26.5.1 requires Python >=3.10 (found 2026-07-20: an unconditional pin here made
    # `pip install -e ".[all,dev]"` fail outright on CI's py3.9 matrix leg with "No solution found" --
    # that leg doesn't run black, so it doesn't need it installable; mirrors the identical fix already
    # applied to pyutilz's pyproject.toml for the same root cause).
    "black==26.5.1 ; python_version >= '3.10'",  # pinned exact, matching CI's `BLACK_CMD: uvx black==26.5.1` (black-filtered.yml)
                                    # -- same rationale as ruff above; verified 2026-07-18 this exact version is
                                    # already filtered-Black-clean across the whole src/mlframe tree (no reformat).
    "mypy>=1.0",
    "bandit>=1.7",
    "pre-commit>=3.3",
    "pip-audit>=2.7",             # known-CVE scan of installed/declared deps; run via `python -m pip_audit --local` (or `-r pyproject.toml` for the declared-only, non-transitive set)
    "import-linter>=2.0",         # architectural-boundary contracts (see [tool.importlinter]); run via `lint-imports`
    "pydoclint>=0.5",             # docstring-vs-signature consistency (params/returns/raises actually match); run via `pydoclint src/mlframe`
    "semgrep>=1.70",               # custom org-specific static rules (see .semgrep.yml); run via `semgrep --config .semgrep.yml src/mlframe`
    # IPython is imported unconditionally by src/mlframe/evaluation/reports.py
    # and training/evaluation.py (for display_html / rich-shell detection).
    # Required so test collection of the modules that import them succeeds.
    "ipython>=8.0",
    # Shared CI/lint tooling (black_filtered_apply / format_warn / bandit_warn / vulture_warn),
    # consumed by .pre-commit-config.yaml's `language: system` local hooks. Not yet on PyPI --
    # install from GitHub, mirroring the existing pyutilz dependency pattern.
    # X_SECURITY_API_PACKAGING-5 fix (mrmr_audit_2026-07-22): pinned to a specific commit SHA rather
    # than the floating default branch (see the matching pyutilz note above for the rationale). Bump
    # deliberately (with a CHANGELOG entry) when a new py-ci-shared feature is actually needed.
    "py-ci-shared @ git+https://github.com/fingoldo/py-ci-shared.git@5851e65e7582a77ea1d37a2ec3c9940cd46f55a7",
]

[project.scripts]
mlframe-tune-kernels = "mlframe.system.kernel_tuning_cache:main"

[project.urls]
Homepage = "https://github.com/fingoldo/mlframe"
Documentation = "https://fingoldo.github.io/mlframe/"
Repository = "https://github.com/fingoldo/mlframe.git"
Issues = "https://github.com/fingoldo/mlframe/issues"
Changelog = "https://github.com/fingoldo/mlframe/blob/master/CHANGELOG.md"

[tool.setuptools]
# Do NOT auto-include everything MANIFEST.in matches as package data; that would
# ship the dev _benchmarks trees into the wheel. Only the explicit package-data
# below is bundled. MANIFEST.in still governs the sdist.
include-package-data = false

[tool.setuptools.dynamic]
version = {attr = "mlframe.version.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["mlframe*"]
exclude = ["tests*", "legacy*", "benchmarks*", "profiling*", "docs*", "scripts*", "*._benchmarks", "*._benchmarks.*"]

# Static data files shipped with the wheel (if any).
[tool.setuptools.package-data]
mlframe = ["py.typed"]
# The anonymized default kernel-tuning JSON is consulted at runtime by
# filters._kernel_tuning (register_default_cache), so it MUST ship in the wheel.
"mlframe.feature_selection.filters" = ["default_kernel_tuning.json"]
# Vendored infonet configs referenced by its inference entry point.
"mlframe.feature_selection.filters._vendored.infonet" = ["configs/*.yaml"]

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
pythonpath = ["src"]
# -p no:anyio / no:asyncio: the repo has zero async tests, and both transitively-installed async pytest plugins segfault the interpreter during collection on this stack -- anyio under CUDA_VISIBLE_DEVICES="" (CPU-only / CI), asyncio under a visible GPU (their event-loop native init collides with the CUDA/numba context). Unused plugins, so unloading both is pure upside.
addopts = "-ra -s --no-cov --strict-markers --strict-config --timeout=600 --instafail --ignore=legacy --ignore=benchmarks --ignore=profiling -p no:anyio -p no:asyncio"
xfail_strict = true
doctest_optionflags = "NORMALIZE_WHITESPACE ELLIPSIS"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks integration tests requiring full pipeline",
    "gpu: marks tests requiring GPU hardware",
    "benchmark: pytest-benchmark timing tests",
    "multigpu: requires multiple GPUs",
    "windows_only: skip on non-Windows",
    "linux_only: skip on non-Linux",
    "fast: fast subset (select with '-m fast'). Every new ML feature ships with a representative subset marked @pytest.mark.fast so the full code path runs in <15s total.",
    "slow_only: only runs when --slow flag is passed",
    "no_xdist: cannot run under pytest-xdist parallelism",
    "requires_xgb: requires xgboost",
    "requires_cb: requires catboost",
    "requires_torch: requires torch",
    "uses_matplotlib: test produces matplotlib figures; triggers plt.close('all') + gc in cleanup_memory autouse",
    "uses_torch: test allocates GPU/CPU torch tensors; triggers torch.cuda.empty_cache in cleanup_memory autouse",
    "numba_disabled: include in the NUMBA_DISABLE_JIT=1 nightly coverage run; tests run 10-100x slower under no-JIT, see scripts/run_numba_coverage.{sh,ps1}",
    "sklearn_matrix: include in the multi-sklearn-version CI matrix (.github/workflows/sklearn-matrix-ci.yml); tests pin scikit-learn surface contracts across the supported version range (1.6-1.8) and must NOT depend on private internals. See tests/test_meta/test_sklearn_matrix_marker_invariants.py for the convention.",
    "strict_cpu_only: test requires a CPU-only run (CUDA_VISIBLE_DEVICES=\"\") and must be skipped/fail fast otherwise; see tests/feature_selection/biz_val/conftest.py.",
]
filterwarnings = [
    "error::DeprecationWarning:mlframe",
    "ignore::DeprecationWarning",
    "ignore:.*penalty.*deprecated.*1\\.8:FutureWarning:sklearn",
    "ignore:.*quantile_method.*linear.*averaged_inverted_cdf:FutureWarning:sklearn",
    "ignore:X does not have valid feature names.*LGBMClassifier:UserWarning:sklearn",
    "ignore:Falling back to prediction using DMatrix due to mismatched devices:UserWarning:xgboost",
    "ignore:Skipping features without any observed values:UserWarning:sklearn",
    "ignore:The '.*dataloader' does not have many workers:UserWarning:lightning",
    "ignore:CheckpointDir.*exists and is not empty:UserWarning:lightning",
    "ignore:The number of training batches.*smaller than.*log_every_n_steps:UserWarning:lightning",
    "ignore:GPU available but not used:UserWarning:lightning",
    "ignore:You are trying to `self.log\\(\\)`.*trainer.*not registered:UserWarning:lightning",
    "ignore:Found.*module.*in val module that:UserWarning:lightning",
    # pytest-benchmark auto-disables itself under xdist (the default suite runs with -n); the benchmark tests are exercised for correctness, timing happens in the dedicated standalone benchmark workflow.
    "ignore:Benchmarks are automatically disabled because xdist plugin is active:pytest_benchmark.logger.PytestBenchmarkWarning",
    # joblib/loky resource_tracker noise on Windows: the loky worker memmap-folder cleanup races the OS file deletion at shutdown (FileNotFoundError / "leaked folder objects"). Third-party, unfixable here; the in-process variant is filtered, the resource-tracker-subprocess variant is harmless shutdown stderr.
    "ignore:resource_tracker:UserWarning",
    # numba GPU under-utilisation hints on the tiny synthetic GPU-test shapes (grid size N): performance advice, not a defect; the production shapes that justify the kernels are far larger.
    "ignore:Grid size.*will likely result in GPU under-utilization:numba.core.errors.NumbaPerformanceWarning",
    # cupy can't auto-detect a CUDA_PATH on this layout (it works regardless via the bundled libs); the mlframe auto-config sets CUDA_PATH for numba, cupy just emits this once.
    "ignore:CUDA path could not be detected:UserWarning:cupy",
    # shap.summary_plot seeds the legacy global numpy RNG internally (np.random.seed) -> numpy 2.x FutureWarning; third-party, not an mlframe call.
    "ignore:The NumPy global RNG was seeded by calling `np.random.seed`:FutureWarning",
    # scipy spearman/pearson on a constant input column (degenerate synthetic fixtures): correlation undefined -> the caller already orients to the stable default; third-party advisory.
    "ignore:An input array is constant.*correlation coefficient is not defined:",
    # polars LazyFrame.columns schema-resolve perf hint surfaced via a defensive duck-typed ``hasattr(X, 'columns')`` probe in degenerate-column detection; advisory only.
    "ignore:Determining the column names of a LazyFrame requires resolving its schema:",
]
log_cli = false

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------
[tool.coverage.run]
source = ["src/mlframe"]
omit = [
    "tests/*",
    "legacy/*",
    "benchmarks/*",
    "profiling/*",
    "*/__pycache__/*",
    "*/site-packages/*",
    ".venv/*",
    "*/integrations/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "def __str__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "if 0:",
    "if False:",
]
precision = 2
show_missing = true

# ---------------------------------------------------------------------------
# Bandit
# ---------------------------------------------------------------------------
[tool.bandit]
# B101 (assert_used): assertions throughout this codebase police internal invariants, not a
# security boundary -- 85 of 89 current findings are this single, non-actionable class.
skips = ["B101"]

# ---------------------------------------------------------------------------
# Codespell
# ---------------------------------------------------------------------------
[tool.codespell]
# Every entry below is a confirmed false positive from the 2026-07-08 sweep: a domain
# abbreviation (MIs=mutual-information values, ALS=alternating least squares, MAPE/mape=mean
# absolute percentage error, LAMA/lama=LightAutoML, ACI=adaptive conformal inference,
# COO=coordinate sparse format, ttest/disjointness/unparseable=valid English), or a
# short substring codespell matched inside a longer identifier/comment fragment
# (strat/ser/clen/fo/anc/mis/numer/sav/bu/ans/ot/qest/OLL), or a hyphenated spelling
# choice that is not a typo (re-use/re-used/re-using/re-uses).
ignore-words-list = "nd,hist,te,ith,ba,thi,fpr,tre,strat,ser,clen,fo,anc,mis,als,mis,mape,lama,aci,coo,oll,ot,qest,ttest,disjointness,unparseable,numer,sav,bu,ans,re-use,re-used,re-using,re-uses,compilability,accreting,lightening,addres,categor"
# Migration to per-line `# codespell:ignore <word>` (2026-07-18 architecture review suggestion)
# evaluated for the short/collision-prone entries (nd/te/fo/ba/ot/bu et al.) and NOT done: a
# spot-check (temporarily dropping them from this list and re-running codespell) showed hundreds
# of hits each, overwhelmingly matching legitimate code identifiers in this numerics-heavy
# codebase -- "nd" as ndarray-dimension shorthand, "TE"/"te" as target-encoding abbreviation,
# "fo" as a substring inside longer identifiers -- not English prose. Per-line-annotating every
# one of those call sites would add hundreds of noisy comments for a real-typo-masking risk that's
# genuinely low here (these tokens rarely appear as actual English words in this codebase's
# comments). The longer, unambiguous multi-char domain acronyms (mape/lama/aci/coo/disjointness/
# unparseable/compilability/etc.) stay global for the same reason the review itself endorsed: they
# are never going to collide with a genuine typo anywhere in this codebase.

# ---------------------------------------------------------------------------
# Deptry (unused / missing / transitive dependency scan). Blocking since 2026-07-09 (see the CI
# lint-blocking job's deptry-install-command). The ~37k-finding number from an early `uvx deptry .`
# dry run (2026-07-08) was itself an artifact of running deptry without the project's real extras
# installed -- deptry infers a package's import name from its INSTALLED metadata (e.g.
# scikit-learn -> sklearn), so a bare/isolated environment makes every such package look both
# "missing" and mis-guessed at once. No [tool.deptry.package_module_name_map] needed: re-running
# with `pip install -e ".[all,dev]"` actually done first (`python -m deptry .`, not `uvx deptry .`
# -- uvx's own isolated tool venv has the same bare-environment problem) surfaced exactly 1 real
# finding, resolved via the per_rule_ignores below.
# ---------------------------------------------------------------------------
[tool.deptry]
# deptry's exclude uses re.match() (anchored at the START of the relative path), so a bare
# substring like "_benchmarks" only matches a path that BEGINS with it -- it never matches
# "src/mlframe/.../_benchmarks/...". Every pattern below is prefixed with ".*" so it matches
# anywhere in the path, and uses [\\/] (not a bare "/") so it matches on Windows' backslash
# relative paths too, not just POSIX ones.
exclude = [
    "(.*[\\/])?tests[\\/].*", "(.*[\\/])?scripts[\\/].*", "(.*[\\/])?legacy[\\/].*",
    "(.*[\\/])?benchmarks[\\/].*", "(.*[\\/])?_benchmarks[\\/].*", "(.*[\\/])?profiling[\\/].*",
    "(.*[\\/])?\\.venv[\\/].*", "(.*[\\/])?build[\\/].*", "(.*[\\/])?dist[\\/].*", "(.*[\\/])?\\.claude[\\/].*",
]

# ---------------------------------------------------------------------------
# Interrogate (docstring coverage). Mirrors pyutilz's config. Blocking at --fail-under=100 since
# 2026-07-09 (see the CI lint-blocking job and the .pre-commit-config.yaml interrogate-blocking
# hook) -- reached 100% before this gate was wired up to enforce it. 63.1% raw baseline before
# THIS config existed included every dunder/private/init method interrogate's defaults demand
# docstrings for; with these standard excludes the real baseline was lower and meaningful.
# ---------------------------------------------------------------------------
[tool.interrogate]
ignore-init-method = true
ignore-init-module = true
ignore-magic = true
ignore-private = true
exclude = ["tests", "scripts", "docs", "build", "dist", "**/_benchmarks/**", "**/benchmarks/**"]
verbose = 1

# ---------------------------------------------------------------------------
# import-linter (architectural-boundary contracts). Added 2026-07-18 CI/CD architecture review --
# advisory only (see .github/workflows/lint-advisory.yml / lint-advisory-warn pre-commit hook),
# not blocking: only 1 contract exists so far, chosen because it's genuinely safe (verified 0
# findings via a quick import-graph spot-check before adding) rather than a full layered-
# architecture policy this codebase hasn't been designed against from the start. Run via
# `lint-imports`.
#
# A "vendored third-party code stays isolated" contract was ATTEMPTED but dropped: grimp (the
# graph library import-linter uses) never discovers leading-underscore SUBDIRECTORIES as packages
# during its filesystem scan (confirmed: `_vendored/infonet` never appears in
# `grimp.build_graph('mlframe').modules` even with an `__init__.py` added, while sibling
# non-underscore subpackages like `filters.mrmr`/`filters.discretization` are found fine) -- a
# grimp/import-linter tool limitation, not a config mistake. Revisit if a future grimp release
# fixes underscore-directory discovery.
# ---------------------------------------------------------------------------
[tool.importlinter]
root_packages = ["mlframe"]

[[tool.importlinter.contracts]]
name = "Kernel-sibling modules split off the 1k-LOC ceiling must not import back their facade"
type = "forbidden"
source_modules = [
    "mlframe.feature_selection.filters._gpu_resident_select_kernels",
    "mlframe.training.composite.provenance_formulas",
]
forbidden_modules = [
    "mlframe.feature_selection.filters._gpu_resident_select",
    "mlframe.training.composite.provenance",
]
# allow_indirect_imports=true restricts the check to DIRECT imports only: this is a flat, densely
# cross-referenced package (everything transitively reaches almost everything else through
# unrelated legitimate chains), so the default transitive check flagged real-but-irrelevant long
# paths (e.g. kernels -> radix_ktc -> select -> ... -> composite -> provenance, none of which is
# the sibling literally importing its own facade back). Only a genuine direct back-import is the
# real circular-import risk the monolith-split pattern needs to avoid.
allow_indirect_imports = true
# Both siblings were carved out of an over-1k-LOC parent (CLAUDE.md's monolith-split convention)
# specifically so the parent could re-export their names -- a back-import would create a real
# circular-import risk the split was designed to avoid. Add each new facade/sibling pair here as
# the monolith-split pattern is applied to more files.

[tool.deptry.per_rule_ignores]
# DEP002 (unused declared dependency): many optional extras are declared for callers who reach
# the underlying package directly (or via a lazily-imported code path deptry's static scan can't
# always follow through the optional-dependency try/except gates used throughout mlframe).
# Extended 2026-07-09 (deptry triage) with: dev-tool deps invoked as CLI/pre-commit hooks rather
# than imported (ruff, black, mypy, bandit, pre-commit, coverage), pytest plugins only exercised
# from tests/ (excluded from the scan below, so their usage is invisible to deptry), docs-build
# tools (mkdocs-*), DB connector extras with no current in-repo consumer (sqlalchemy,
# psycopg2-binary, pymongo, duckdb, hdbscan), and GPU-extras packages declared identically across
# more than one optional-dependency group (nvidia-cuda-nvcc-cu11/-cu12, gpu-info, cupy-cuda11x)
# which deptry double-reports once per group.
# Extended again same day with: transitive-dependency SECURITY FLOORS. Each is pinned solely to
# raise a vulnerable transitive resolution above its patched version (see the inline PYSEC/CVE/
# GHSA comment next to each declaration in [project.optional-dependencies]/[build-system] above)
# -- never imported directly by mlframe itself, by design.
DEP002 = [
    "catboost", "xgboost", "lightgbm", "torch", "cupy", "shap", "optuna",
    "tqdm", "portalocker", "sentencepiece", "flaml", "altair", "hvplot", "vegafusion", "vl-convert-python", "ipywidgets",
    "sqlalchemy", "psycopg2-binary", "pymongo", "duckdb", "hdbscan",
    "nvidia-cuda-nvcc-cu12", "gpu-info", "cupy-cuda11x", "nvidia-cuda-nvcc-cu11",
    "mkdocs-material", "mkdocs-jupyter",
    "pytest", "pytest-cov", "pytest-xdist", "pytest-timeout", "pytest-benchmark", "pytest-order",
    "pytest-randomly", "pytest-instafail", "pytest-progress", "pytest-split", "pytest-rerunfailures", "coverage", "freezegun",
    "ruff", "black", "mypy", "bandit", "pre-commit", "pip-audit",
    "import-linter", "pydoclint", "semgrep",  # invoked as `lint-imports`/`pydoclint`/`semgrep` CLI commands, never imported
    "pillow", "setuptools", "tornado", "aiohttp", "cryptography", "starlette",
    "py-ci-shared",  # invoked as `python -m py_ci_shared.*` CLI/pre-commit-hook commands, never `import py_ci_shared`
]

# DEP001 (import missing from declared deps): genuinely optional third-party libs behind
# try/except ImportError guards (never a hard runtime requirement), plus the vendored infonet
# package's sys.path-injected local `model`/`infer` modules (not third-party at all -- deptry
# can't see the sys.path.insert() a few lines above each such import and misreads them as
# missing external packages).
DEP001 = [
    "ml_insights", "dirichletcal", "pycaret", "sklearnex", "hnswlib", "ndd", "BorutaShap",
    "powershap", "ngboost", "autogluon", "lightautoml", "quantile_forest", "sksurv", "tensorflow",
    "keras", "experiment_impact_tracker", "concepts", "gudhi", "loky", "mist_statinf",
    "infer", "model", "finance", "pyod",
    # pytorch_lightning (2026-07-18, moved here from a stale DEP002 entry -- found via the new
    # test_deptry_ignores_not_stale meta-test): this is genuinely a missing-declared-dep case, not
    # unused-declared -- the package is deliberately NOT depended on (see the `lightning>=2.0`
    # comment above; installing both invites version-skew), but 3 call sites still import it
    # defensively as a legacy-name fallback, each guarded by `importlib.util.find_spec(...) is
    # not None` + try/except.
    "pytorch_lightning",
    # tests/-scoped additions (2026-07-17, when tests/ started being deptry-scanned separately via
    # `deptry . --exclude ... ` overriding the tests/ exclude below): LOCAL test-helper modules
    # imported by bare filename from a sibling file in the same tests/ subdirectory (e.g.
    # tests/perf/profile_training_core.py imported from another tests/perf/ file) -- not pip
    # packages at all, deptry can't distinguish a same-directory local import from a missing
    # third-party one. `allpairspy` and `arfs` are genuine undeclared third-party test-only deps
    # and are deliberately NOT added here -- they should keep surfacing until added to a test
    # extras group or their call sites are confirmed to always `pytest.importorskip` first.
    "test_coverage_fill", "training", "profile_training_core", "_source_proxy_scan",
]

# DEP003 (transitive dependency imported directly): mirrors DEP002's stance -- these are pulled in
# transitively by an already-declared direct dependency (e.g. filelock/cpuinfo via numba/pyutilz,
# kaleido/torchvision/torchmetrics/lightning_fabric via torch+plotly+lightning, triton via torch,
# networkx/llvmlite/dtaidistance/mlxtend/sympy/bottleneck/ortools/yaml via the sklearn/scipy/numba
# ecosystem, model_diagnostics via the calibration reporting extras), and pinning them as direct
# deps would duplicate version constraints already owned by their parent package.
# `finance` is a DIFFERENT case entirely (flagged in a 2026-07-09 CI/CD architecture review as
# looking stale/unjustified under this section's own rationale -- correctly so, it doesn't fit):
# it's a private sibling library (github.com/fingoldo/finance, never on PyPI), try/except-guarded
# in evaluation/reports.py, genuinely not a transitive dep of anything. It's ignored under BOTH
# DEP001 and DEP003 because deptry's classification of it flips depending on whether the sibling
# checkout happens to be resolvable in the environment deptry runs in (DEP003 when resolvable
# locally, as in this dev environment; DEP001 "missing" in a clean CI checkout that never has it).
# `concepts` (formal-concept-analysis lib, feature_engineering/transformer/fca_closed_concepts.py)
# has the identical flip: DEP001-listed above for a clean env, but deptry reports it as DEP003 in
# any environment where it happens to be installed -- ignored under both for the same reason, not
# because it's an actual transitive dep of anything else here. (`xxhash` USED to have the same flip
# before it was promoted to a hard `dependencies` entry above, 2026-07-17 -- no longer needs an
# ignore at all, deptry resolves it as a normal direct dependency now.)
DEP003 = [
    "filelock", "cpuinfo", "kaleido", "torchvision", "torchmetrics", "lightning_fabric",
    "pytorch_lightning", "triton", "networkx", "llvmlite", "dtaidistance", "mlxtend", "sympy",
    "bottleneck", "ortools", "yaml", "model_diagnostics", "finance", "concepts",
    # tests/-scoped additions (2026-07-17, see the DEP001 comment above for the scan-scope context):
    # transitive deps of already-declared direct deps, imported directly from test code -- thinc is
    # spacy's transitive engine, pydantic_core is pydantic's own transitive Rust core, tomli comes
    # in via a pytest-plugin's transitive chain, packaging is ubiquitous across the whole toolchain.
    "thinc", "pydantic_core", "tomli", "packaging",
    # colorama (2026-07-17): numba's OWN transitive dependency (numba.core.errors uses it directly for
    # warning-message highlighting) -- mlframe/__init__.py's _patch_colorama_reinit_storm imports it
    # directly to fix a numba-side performance bug (see that function's docstring), but never NEEDS it
    # installed independently of numba, which already guarantees its presence whenever the GPU path
    # (the only place this patch runs) is reachable at all.
    "colorama",
]

# ---------------------------------------------------------------------------
# Black
# ---------------------------------------------------------------------------
[tool.black]
line-length = 160
target-version = ["py39", "py310", "py311", "py312", "py313", "py314"]
exclude = '''
/(
    \.git
  | \.venv
  | \.pytest_cache
  | build
  | dist
  | __pycache__
  | legacy
)/
'''

# ---------------------------------------------------------------------------
# Ruff
# ---------------------------------------------------------------------------
# Base select/ignore (E,W,F,I,N,UP,B,DTZ,A,T20,RUF,G,ISC,PERF,C90 + the generic ignores this
# repo helped establish) is pulled in from $PY_CI_SHARED_DIR/configs/ruff-base.toml via `extend`
# -- a real config merge, not copy-paste; ruff expands env vars in `extend` paths (docs.astral.sh/
# ruff/settings), so PY_CI_SHARED_DIR just needs to point at ANY real py-ci-shared checkout, not a
# sibling directory specifically (see that repo's README "Using the shared ruff config" section for
# the full rationale, and this repo's own CLAUDE.md "RUF100" section for why `extend`/
# `extend-ignore` -- never `--select` -- is the only safe way to layer local settings on top).
# Everything below is mlframe-specific: dir excludes, target-version floor, the two additional
# ignores this codebase specifically needs, and the MEASURED mccabe threshold (complexity
# distributions differ per codebase; never copy another repo's number).
[tool.ruff]
extend = "$PY_CI_SHARED_DIR/configs/ruff-base.toml"
target-version = "py39"
exclude = ["tests", "scripts", ".git", "__pycache__", "build", "dist", "legacy", "benchmarks", "_benchmarks", "profiling"]

[tool.ruff.lint]
extend-select = [
    "PD002",  # pandas inplace=True: real correctness footgun (silently no-ops on a view/copy in some
              # pandas versions/configs). Added 2026-07-18; triaged to 0 findings -- every genuine
              # inplace-on-caller's-object-by-identity call site got a documented # noqa, every plain
              # local-var mutation got rewritten to `df = df.method(...)`. The rest of the PD (pandas-vet)
              # category stays off: PD011 (.values, 115 hits) / PD013 (.stack) / PD003/PD009/PD010/PD101
              # are stylistic-only on this codebase (no correctness delta found in a spot-check), not
              # worth the mass-rewrite diff/review risk right now.
]
# SIM/RET/TRY (2026-07-18 architecture review suggestion) evaluated and NOT enabled this pass:
# `ruff check --select SIM,RET,TRY` surfaces 3803 findings, 69% of them TRY003 (raise-vanilla-args)
# -- confirmed noisy exactly as the review itself flagged ("TRY003 on long exception messages is
# often noisy"), plus large stylistic-only categories (SIM108 if-else-block, RET505 superfluous-
# else-return, TRY300 try-consider-else). The 6 RET503 (implicit-return) findings are genuinely
# worth fixing (a function whose control flow can fall through without hitting `return` is a real
# "did I mean to return None here" question) but each needs its actual ~100+-line body read to
# place an explicit `return None` correctly, not a batch mechanical edit -- deferred as a real,
# tracked follow-up rather than rushed. Revisit with a scoped triage pass (start with RET503/
# TRY004/SIM101, the smallest and highest-signal codes) before considering broader adoption.
extend-ignore = [
    "UP035",  # collections.abc import modernization: 640 hits, pure import-source churn, no correctness value
    "N815",   # mixedCase class-scope variable: flags domain-abbreviation names like cached_MIs (MIs = mutual-information values)
    "NPY002", # legacy np.random.* over np.random.Generator: triaged 2026-07-18, all 15 findings are structurally
              # load-bearing, not accidental -- numba njit kernels (Generator isn't nopython-mode compatible),
              # utils.misc.set_random_seed's documented global-seed contract (relied on throughout the test
              # suite), and screen.py's np.random.get_state/set_state snapshot-restore pattern (Generator has no
              # equivalent global-state API). Migrating any of these changes the RNG's output STREAM even at an
              # identical seed, silently invalidating every determinism-pinned test/fixture that depends on it --
              # a real, not hypothetical, correctness risk from "fixing" this rule. NPY (all other subcategories,
              # e.g. NPY201 deprecated-API removal) stays selected via ruff-base.toml; only NPY002 is ignored here.
]

[tool.ruff.lint.mccabe]
# Raised 2026-07-09 after triage: threshold=20 flagged 246 functions (median complexity in this
# codebase is 30 -- half the codebase would be "too complex" at 20, pure noise). threshold=40 keeps
# 70 findings, including the genuinely pathological outliers (_fit_impl at 1227, materialise_and_
# finalise_fe_candidates at 141, _score_one_pair at 117) without flagging routine 20-40 dispatch/
# config functions that are complex by the nature of a config-driven ML pipeline, not by neglect.
# NOT shared via ruff-base.toml -- this is mlframe's own measured number (pyutilz's is 20).
#
# Honest framing (flagged in a 2026-07-09 CI/CD architecture review): 40 is a NOISE-SUPPRESSION
# threshold calibrated to this codebase's CURRENT complexity distribution, not a deliberate
# "acceptable complexity budget" -- a median of 30 is itself high. The 70 remaining findings are
# real, tracked debt (see CLAUDE.md's module-size-limit / monolith-split rule for the mechanism
# already used to break up the worst offenders), not a design choice to leave permanently open.
max-complexity = 40

# pep8-naming ignore-names = ["F", "L", "_F"] is inherited from ruff-base.toml -- no local
# declaration needed.

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
# Tutorial notebooks: print() is the intended interactive display, not a lint issue.
"docs/**/*.ipynb" = ["T201"]
# B023 (loop-variable closure capture): profiling scripts define ad-hoc closures per
# iteration purely to time/print that iteration's inputs immediately, never storing the
# closure for later -- exactly the case B023 can't distinguish from a real deferred-call bug.
# T201 (print found): CLI entry points and interactive profile/demo/showcase scripts print to
# stdout by design -- that IS their interface, not a lint issue vs. converting to logger calls.
"src/mlframe/system/kernel_tuning_cache/__init__.py" = ["T201"]
"src/mlframe/**/_profile_*.py" = ["B023", "T201"]
"src/mlframe/**/_smoke_*.py" = ["T201"]
"src/mlframe/**/_*_showcase.py" = ["T201"]
# Vendored third-party model code -- left at upstream shape.
"src/mlframe/feature_selection/filters/_vendored/**" = ["T201", "A001", "A002", "N801"]
# numba @njit kernels: verbose-gated diagnostic prints inside nopython-mode functions cannot use the
# ``logging`` module (numba does not support arbitrary Python objects in nopython mode); print() is the
# only available diagnostic channel there.
"src/mlframe/feature_selection/filters/info_theory/_class_encoding.py" = ["T201"]
"src/mlframe/feature_selection/filters/info_theory/_entropy_kernels.py" = ["T201"]
# _print_fit_summary: deliberately bypasses logger (see its docstring) because logger.info is silently
# swallowed by scripts that never configure logging, while this is the one guaranteed-visible summary line.
"src/mlframe/feature_selection/filters/mrmr/_mrmr_class_fit_helpers.py" = ["T201"]

# ---------------------------------------------------------------------------
# MyPy
# ---------------------------------------------------------------------------
[tool.mypy]
# The project's minimum RUNTIME support is still 3.9 (see [project] requires-python);
# this is only the syntax-checking target mypy 2.x type-checks against, and mypy 2.x
# dropped 3.9 support for that setting (raises "Python 3.9 is not supported" otherwise).
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
check_untyped_defs = true
# Ratchet added 2026-07-08 after the mypy sweep closed the error backlog to ~0: flags now-dead
# `# type: ignore` comments (zero true-positive burden today; guards against future drift).
warn_unused_ignores = true
exclude = "(legacy|_?benchmarks|profiling)/"

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true

# Strict-mode beachhead: mlframe.calibration is the smallest subpackage (5 files, ~1.3 kLOC total)
# with a stable public surface, low optional-dep churn (only ``post.py`` pulls heavy deps and gates
# them lazily), and tight scope (probability calibration metrics + post-hoc calibrators). Adopting
# strict mode here first surfaces type drift on the smallest blast radius; expansion to other
# subpackages should follow only after this one has been clean for one release.
# Re-verified clean 2026-07-06: a prior "clean" claim here had gone stale (drifted to ~90 real
# errors across all 5 files with no CI enforcement to catch it -- see the CI mypy step in
# .github/workflows/ci.yml). Fixed all of them (missing/incomplete annotations, implicit-Optional
# defaults, Any-returns needing an explicit np.asarray/float cast) without weakening this override,
# plus one genuine bug the annotation pass surfaced: quality.make_custom_calibration_plot indexed
# `ax_probs[plot_idx]` even when skip_plotting=True (ax_probs is None then) -- TypeError. See
# tests/calibration/test_regression_quality_unbound_and_guard.py for the regression test.
[[tool.mypy.overrides]]
module = "mlframe.calibration.*"
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_return_any = true
no_implicit_optional = true

# numba ships no py.typed marker, so mypy can't see njit/prange are real public attributes and
# flags every `from numba import njit` as attr-defined -- not a real type error, just a stub gap.
# "numba.*" (not just "numba"): the exact-name override didn't cover submodules like numba.cuda,
# whose metaprogrammed @cuda.jit intrinsics (_Intrinsic.__call__, Dim3, grid/threadIdx/etc.) have
# stub signatures mypy can't reconcile with real call sites -- Callable[[Dim3], Any] operator/
# call-overload/call-arg noise across every GPU-kernel module (confirmed 2026-07-08, MyPy (full)
# CI job: friend_graph_gpu.py, _batch_mi_noise_gate_kernels.py, _gpu_metrics.py, dtw.py, etc.).
[[tool.mypy.overrides]]
module = "numba.*"
follow_imports = "skip"
follow_imports_for_stubs = true

# Second strict-mode beachhead: ``mlframe.utils.safe_pickle`` (162 LOC) -- shipped post-2026-05 with
# full annotations + ``from __future__ import annotations``, public surface consumed by the four
# pickle entry points (predict / inference / FE cache / composite cache) so type drift would cascade
# straight to the on-disk format. Other utils modules (eda, experiments, misc, text, nan_safe) still
# use the legacy ``from typing import *`` pattern, incomplete annotations, or numpy-return-any
# patterns; they remain off strict-mode until dedicated typing passes land them.
[[tool.mypy.overrides]]
module = "mlframe.utils.safe_pickle"
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_return_any = true
no_implicit_optional = true

# Beachhead expansion (per the gradual-strict plan): four already-well-typed, cohesive leaf modules
# that surfaced 0-3 errors each under strict mode and are now clean:
#   * mlframe.system._gpu_guard            -- 0 errors (fully annotated GPU import guard)
#   * mlframe.metrics._numba_params        -- 1 (shared njit kwargs + length-check guard)
#   * mlframe.metrics.rank_correlation     -- 1 (Spearman njit kernels; np-scalar float() casts)
#   * mlframe.metrics._core_precision_mape -- 3 (precision / classification-report / MAPE kernels)
# All are self-contained numba/kernel leaves with a stable public surface and low optional-dep churn,
# so the blast radius stays small. Further metrics.* / core.* modules join only after a dedicated
# typing pass drives their remaining np-return-any / untyped-def counts to zero.
[[tool.mypy.overrides]]
module = [
    "mlframe.system._gpu_guard",
    "mlframe.metrics._numba_params",
    "mlframe.metrics.rank_correlation",
    "mlframe.metrics._core_precision_mape",
]
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_return_any = true
no_implicit_optional = true

# These two modules feature-detect newer lightning/torch APIs (WeightAveraging, added Lightning
# ~2.5; get_ema_avg_fn's exact availability) via `try: from X import Y / except ImportError:` at
# runtime, with a `# type: ignore[attr-defined]` on the import since older installs genuinely lack
# the attribute. ranker.py's GroupBatchSampler.__init__ has the same story for torch's Sampler
# base (older torch's stub requires `data_source`; newer torch's bare-object base doesn't).
# Whether these ignores are "needed" is a property of the extras version resolved, not the code:
# MyPy (full) CI resolves an older lightning/torch lacking these APIs (ignore needed, real error
# without it); a newer dev environment that already has them makes the same ignore comment
# "unused" under the global warn_unused_ignores ratchet. Exempt just these files rather than
# weakening the ratchet project-wide.
[[tool.mypy.overrides]]
module = [
    "mlframe.training.neural.base._base_fit",
    "mlframe.training.neural.recurrent_dataset_helpers",
    "mlframe.training.neural.ranker",
    "mlframe.training.neural.base",
    "mlframe.feature_engineering.transformer.apriori_itemsets",
    "mlframe.training.neural._sam_optimizer",
    "mlframe.training.neural._lookahead_optimizer",
    "mlframe.preprocessing.cluster",
]
warn_unused_ignores = false
