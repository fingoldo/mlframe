# Linter / formatter config. Pytest config lives in pytest.ini.

[tool.black]
line-length = 160
target-version = ['py38', 'py39', 'py310', 'py311', 'py312', 'py313', 'py314']
exclude = '''
/(
    \.git
  | \.venv
  | \.pytest_cache
  | build
  | dist
  | __pycache__
)/
'''

[tool.ruff]
line-length = 160
target-version = "py38"
exclude = ["tests", "scripts", ".git", "__pycache__", "build", "dist", "legacy"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line too long (handled by black)
    "E401",  # multiple imports on one line (legacy code style)
    "E402",  # module level import not at top of file (our style uses comment blocks)
    "E701",  # multiple statements on one line (colon) - legacy code style
    "I001",  # import block is un-sorted or un-formatted (not enforcing import sorting)
    "N802",  # function name should be lowercase (legacy code, fixing separately)
    "N803",  # argument name should be lowercase (camelCase, Hungarian notation in legacy code)
    "N806",  # variable name should be lowercase (legacy code)
    "B006",  # mutable default (fixing separately)
    "F401",  # unused imports (cleaning up separately)
    "F541",  # f-string without placeholders (sometimes used for consistency)
    "UP031", # use format specifiers instead of percent format (legacy code, not urgent)
    # PEP 585 / PEP 604 generics + union syntax. These rewrites require either py3.10+ runtime OR `from __future__ import annotations` in every file
    # that uses the annotation at runtime (e.g. via `typing.get_type_hints()` or pydantic). Since target=py38 is a hard requirement for this codebase
    # (downstream consumers, deployment environments), we silence the suggestions globally rather than per-file. Re-enable when py38 is dropped.
    "UP006", # use `list` instead of `List` for type annotation -- needs py3.9+ at runtime
    "UP007", # use `X | Y` for type annotations -- needs py3.10+ at runtime
    "UP045", # use `X | None` for type annotations -- needs py3.10+ at runtime
    "UP037", # remove quotes from type annotation -- forward refs may still be needed for circular imports under py38
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # unused imports OK in __init__
# Test class names follow an audit-tag convention (TestA1_SingleClassY, TestB6_FooBar) where the underscore separates a structured tag from a descriptive suffix.
"tests/**" = ["N801"]
# Profile / benchmark scripts use `_bench("label", lambda: f(loop_var, ...))` -- the lambda is consumed synchronously by _bench within the same iteration so the
# late-binding capture is safe. Adding default-arg defenses to every benchmark lambda is pure noise.
"training/_profile_*.py" = ["B023"]
