# Pre-commit hooks for mlframe.
#
# Install: ``pip install pre-commit && pre-commit install``
#
# Why a hook for the meta-tests specifically:
#   * They run in <1 minute total (no training, no fixtures).
#   * Each one polices a class of bug — config drift, dead helpers,
#     stale docs, missing wirings — that ESCAPES local test runs because
#     classical regression tests don't exercise the full surface.
#   * Catching them at commit time stops them from reaching CI / a PR
#     review where the round-trip is much slower.
#
# Anything that needs heavy fixtures, downloaded models, or > 30 s of
# wall-clock belongs in the regular pytest suite, not here.

repos:
  # Secret-scanner -- catches accidental commits of API keys / tokens /
  # secrets. Runs on every staged change. Mirrors pyutilz's hook setup.
  # Bootstrap the baseline once with:
  #   detect-secrets scan > .secrets.baseline
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '\.secrets\.baseline$'

  # Actionlint: lints .github/workflows/*.yml for syntax AND semantic bugs
  # (undefined contexts, bad expressions, unknown runner labels, duplicate keys,
  # shell-syntax errors in `run:` blocks via its bundled shellcheck integration).
  # Added 2026-07-06 after a duplicate `continue-on-error:` key silently broke
  # every mlframe CI run for days (advisory-only masking meant nothing caught it
  # locally). Custom self-hosted runner labels are allow-listed in
  # .github/actionlint.yaml.
  - repo: https://github.com/Mateusz-Grzelinski/actionlint-py
    rev: v1.7.12.24
    hooks:
      - id: actionlint

  # Shellcheck: lints standalone .sh scripts (actionlint above covers embedded
  # `run:` blocks via its own shellcheck integration, since shellcheck-py's
  # binary is on PATH in this repo's dev environment). Added alongside actionlint
  # after shellcheck caught a real bug: scripts/run_numba_coverage.sh had CRLF
  # line endings (SC1017), which breaks its shebang on Linux -- no .gitattributes
  # existed to force LF on .sh files. Fixed both.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # Ruff: lint (and lint-fix) pass mirroring CI [tool.ruff] config.
  # The repo's ruff config (line-length=160, select=E/W/F/I/N/UP/B, with the
  # documented ignore list) already lives in pyproject.toml -- the hook
  # consumes that config so behaviour stays identical between local commit
  # and CI lint step. No --select / --ignore CLI args here on purpose.
  # Auto-fix / auto-format are MANUAL-stage only: they rewrite files (churn that
  # collides with concurrent work). On commit they're replaced by the warn-only
  # ``format-lint-warn`` hook below. Apply explicitly with
  # ``pre-commit run --hook-stage manual ruff`` / ``... ruff-format`` / ``... black``.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ['--fix']
        stages: [manual]
      - id: ruff-format
        stages: [manual]

  # Black: formatting pass with line-length=160 (project standard, see
  # [tool.black] in pyproject.toml). target-version matches setup.cfg /
  # pyproject (py39-py313).
  #
  # MANUAL-stage only, same as the ruff auto-fixers above: raw/unfiltered black
  # applies two diff classes the project explicitly excludes (arg/collection-list
  # explosion, blank-line insertion -- see CLAUDE.md "Black repo-wide reformat").
  # Missing `stages: [manual]` here previously meant this hook ran on every
  # commit and would silently reapply both excluded classes. Use
  # `scripts/black_filtered_apply.py --write <files>` for the sanctioned,
  # filtered formatting pass instead of `pre-commit run --hook-stage manual black`.
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3
        stages: [manual]

  # Mypy: scoped strictly to src/mlframe/calibration/ (the Wave 5 strict
  # beachhead per [tool.mypy.overrides] in pyproject.toml). Expanding this
  # files= regex is gated on a separate review per the gradual-typing
  # policy in CONTRIBUTING.md.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        files: '^src/mlframe/calibration/'
        # --follow-imports=silent: this hook's isolated env has none of calibration's heavy
        # transitive deps installed (pandas/torch/lightning/numba/pyutilz), so default
        # follow-imports="normal" walks into every module they import, collapses each
        # missing-dep expression to Any, and reports noise from dozens of files never meant
        # to be covered by this beachhead. Mirrors the same fix in mypy.yml (2026-07-08).
        args: ['--follow-imports=silent']
        # Every dep here is EXACT-pinned, not range-pinned: an unpinned/range-pinned resolve
        # in this isolated hook env drifts silently over time (observed 2026-07-06: picked up
        # numpy 2.5.1, whose bundled .pyi stubs use PEP 695 `type` statements that mypy rejects
        # under our [tool.mypy] python_version="3.10" -- "Type statement is only supported in
        # Python 3.12 and greater" -- while the project's real env ran 2.3.x; observed again
        # 2026-07-08 via the mirrored mypy.yml CI step: identical command, 178 errors in CI vs.
        # 0 locally, traced to a different numpy/scipy/scikit-learn/pydantic/mypy combination
        # each side resolved). Versions below match the project's real dev env.
        additional_dependencies: ['numpy==2.3.5', 'scipy==1.17.1', 'scikit-learn==1.8.0', 'pydantic==2.13.4']

  - repo: local
    hooks:
      - id: mlframe-meta-tests
        name: "mlframe meta-tests (config / strategy / metric invariants)"
        # Wrapper sets NUMBA_DISABLE_JIT=1 + MLFRAME_SKIP_NUMBA_PREWARM=1
        # BEFORE pytest imports anything. Meta-tests are AST/config/structure
        # checks that never execute numba kernels, so the env knobs cost
        # nothing and avoid a CUDA-driver init hang observed in multi-agent
        # sessions on CUDA-equipped dev boxes. ``-p no:randomly`` (inside the
        # wrapper) keeps snapshot diff stable.
        entry: python scripts/run_meta_tests.py
        language: system
        types: [python]
        pass_filenames: false
        # Run on every commit that touches Python source. The meta-tests
        # are quick enough that the per-commit cost is fine; if a
        # contributor wants to skip in a hurry, ``git commit --no-verify``
        # is the one-time escape hatch.
        always_run: false
        stages: [pre-commit]

  # Real-bug gate: pyflakes (undefined names, redefinitions, undefined exports)
  # + syntax errors. Blocks the commit (exit 1 on finding any). False-positive
  # rate is near-zero after the de-star cleanup (F821/F822 are genuine bugs).
  # Stylistic rules (format, import order, naming) are WARN-ONLY via format-lint-warn.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        name: "ruff (real bugs block)"
        # The project's FULL configured select/ignore (pyproject.toml), minus C901 (complexity,
        # advisory-only). Closed to 0 findings on 2026-07-09 after fixing every RUF/G/ISC/PERF
        # finding. Mirrors CI's ``ruff check . --ignore C901`` exactly so a commit that passes
        # locally cannot fail CI and vice versa.
        #
        # CRITICAL: never use ``--select`` here. ``--select`` REPLACES the effective rule set
        # instead of narrowing pyproject.toml's configured select, silently dropping the
        # ``ignore`` list too (RUF001/002/003/022, ISC001, etc. would all reappear) and breaking
        # RUF100's "is this noqa still needed" determination (see CLAUDE.md's 2026-07-09 RUF100
        # incident). ``--ignore`` only ADDS to the configured ignore list, so it is safe.
        entry: python -m ruff check --ignore C901
        language: system
        types: [python]
        stages: [pre-commit]

  # Warn-only style gate: formatting + style lint (E/W/N/UP/I), never blocks.
  # Runs after the blocking gate. See scripts/format_warn.py for the wrapper.
  - repo: local
    hooks:
      - id: format-lint-warn
        name: "ruff format + style lint (warn-only)"
        entry: python scripts/format_warn.py
        language: system
        types: [python]
        verbose: true
        stages: [pre-commit]

  # Warn-only security-lint gate: bandit -ll (medium+ severity), mirroring the
  # advisory CI step (continue-on-error) so findings surface locally too, before
  # only showing up later in the CI artifact. See scripts/bandit_warn.py.
  - repo: local
    hooks:
      - id: bandit-warn
        name: "bandit security scan (warn-only)"
        entry: python scripts/bandit_warn.py
        language: system
        types: [python]
        files: '^src/mlframe/'
        verbose: true
        stages: [pre-commit]

  # Warn-only dead-code gate: vulture --min-confidence 80, mirroring the advisory
  # CI step (continue-on-error). See scripts/vulture_warn.py.
  - repo: local
    hooks:
      - id: vulture-warn
        name: "vulture dead-code scan (warn-only)"
        entry: python scripts/vulture_warn.py
        language: system
        types: [python]
        files: '^src/mlframe/'
        verbose: true
        stages: [pre-commit]

  # Optional: a "fast" alias that runs the static (non-Hypothesis) meta-
  # tests only — useful for ``pre-commit run --hook-stage=manual fast-meta``
  # in tight inner-loop work.
  - repo: local
    hooks:
      - id: mlframe-meta-tests-static-only
        name: "mlframe meta-tests (static checks only — skip Hypothesis)"
        entry: pytest tests/test_meta/ --no-cov -p no:randomly -q -x --deselect tests/test_meta/test_metric_invariants.py --deselect tests/test_meta/test_utility_fuzz.py --deselect tests/test_meta/test_config_round_trip.py
        language: system
        types: [python]
        pass_filenames: false
        always_run: false
        stages: [manual]

  # Keep the committed anonymized default kernel-tuning JSON in sync. On commit
  # this runs --check ONLY (skip_existing): it reads every kernel's live
  # code_version + the committed file and FAILS the commit if they drifted
  # (kernel edited / added / removed but defaults not regenerated). It never
  # sweeps (PYUTILZ_KERNEL_DISABLE_SWEEP=1 in the wrapper) so the commit is fast.
  #
  # On drift:
  #   * Regenerate (may sweep newly-changed kernels): mlframe-gen-default-tuning
  #     then `git add src/mlframe/feature_selection/_benchmarks/default_kernel_tuning.json`
  #   * Or skip this commit's hooks: git commit --no-verify
  #
  # Runs only when Python under src/mlframe changes (a code_version can only move
  # if kernel source moved); pure-doc / test commits don't pay the import cost.
  - repo: local
    hooks:
      - id: gen-default-tuning-check
        name: "default kernel-tuning JSON in sync (--check, no sweep)"
        entry: python scripts/check_default_tuning.py
        language: system
        files: '^src/mlframe/.*\.py$'
        pass_filenames: false
        always_run: false
        stages: [pre-commit]

      # MANUAL fast stage: actually (re)generate the defaults. Use after a kernel
      # edit moved a code_version:  pre-commit run --hook-stage manual gen-default-tuning
      # (equivalent to running ``mlframe-gen-default-tuning`` directly). This MAY
      # run a synchronous sweep for any kernel whose code_version changed, so it
      # is manual-only — never on the commit path.
      - id: gen-default-tuning
        name: "regenerate default kernel-tuning JSON (manual; may sweep)"
        entry: mlframe-gen-default-tuning
        language: system
        pass_filenames: false
        always_run: false
        stages: [manual]
