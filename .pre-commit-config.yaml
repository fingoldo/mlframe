# Pre-commit hooks for mlframe.
#
# Install: ``pip install pre-commit && pre-commit install``
#
# Why a hook for the meta-tests specifically:
#   * They run in <1 minute total (no training, no fixtures).
#   * Each one polices a class of bug — config drift, dead helpers,
#     stale docs, missing wirings — that ESCAPES local test runs because
#     classical regression tests don't exercise the full surface.
#   * Catching them at commit time stops them from reaching CI / a PR
#     review where the round-trip is much slower.
#
# Anything that needs heavy fixtures, downloaded models, or > 30 s of
# wall-clock belongs in the regular pytest suite, not here.
#
# Policy (2026-07-12): every check that is a REAL blocking gate in CI (job failure fails the
# workflow / blocks merge -- no `continue-on-error: true`, not a documented advisory job) has a
# local hook here that runs the SAME command and BLOCKS the commit (default `stages: [pre-commit]`)
# on the same finding. Only genuinely advisory CI signal (continue-on-error jobs, documented
# advisory bundles like lint-advisory.yml's full-select ruff / mccabe complexity / pip-audit, or
# purely stylistic reformatting like ruff-format/import order that CI itself doesn't block on)
# stays warn-only or manual-only locally. `stages: [manual]` is reserved for genuinely optional
# on-demand tooling (raw unfiltered black/ruff --fix, the tuning-JSON regenerator) whose CI
# counterpart either doesn't exist or is itself non-blocking -- never used to silence a real gate.
# Fixed 2026-07-12: Black's filtered-check and the whole-project mypy hook had drifted to
# manual-only/absent despite both mirroring real CI blocking gates (black-filtered.yml,
# mypy-full.yml advisory:false) -- commits were passing locally and only failing once pushed.

repos:
  # Secret-scanner -- catches accidental commits of API keys / tokens /
  # secrets. Runs on every staged change. Mirrors pyutilz's hook setup.
  # Bootstrap the baseline once with:
  #   detect-secrets scan > .secrets.baseline
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '\.secrets\.baseline$'

  # Actionlint: lints .github/workflows/*.yml for syntax AND semantic bugs
  # (undefined contexts, bad expressions, unknown runner labels, duplicate keys,
  # shell-syntax errors in `run:` blocks via its bundled shellcheck integration).
  # Added 2026-07-06 after a duplicate `continue-on-error:` key silently broke
  # every mlframe CI run for days (advisory-only masking meant nothing caught it
  # locally). Custom self-hosted runner labels are allow-listed in
  # .github/actionlint.yaml.
  - repo: https://github.com/Mateusz-Grzelinski/actionlint-py
    rev: v1.7.12.24
    hooks:
      - id: actionlint

  # Shellcheck: lints standalone .sh scripts (actionlint above covers embedded
  # `run:` blocks via its own shellcheck integration, since shellcheck-py's
  # binary is on PATH in this repo's dev environment). Added alongside actionlint
  # after shellcheck caught a real bug: scripts/run_numba_coverage.sh had CRLF
  # line endings (SC1017), which breaks its shebang on Linux -- no .gitattributes
  # existed to force LF on .sh files. Fixed both.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # Ruff: lint (and lint-fix) pass mirroring CI [tool.ruff] config.
  # The repo's ruff config (line-length=160, select=E/W/F/I/N/UP/B, with the
  # documented ignore list) already lives in pyproject.toml -- the hook
  # consumes that config so behaviour stays identical between local commit
  # and CI lint step. No --select / --ignore CLI args here on purpose.
  # Auto-fix / auto-format are MANUAL-stage only: they rewrite files (churn that
  # collides with concurrent work). On commit they're replaced by the warn-only
  # ``format-lint-warn`` hook below. Apply explicitly with
  # ``pre-commit run --hook-stage manual ruff`` / ``... ruff-format`` / ``... black``.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ['--fix']
        stages: [manual]
      - id: ruff-format
        stages: [manual]

  # Black: formatting pass with line-length=160 (project standard, see
  # [tool.black] in pyproject.toml). target-version matches setup.cfg /
  # pyproject (py39-py313).
  #
  # MANUAL-stage only, same as the ruff auto-fixers above: raw/unfiltered black
  # applies two diff classes the project explicitly excludes (arg/collection-list
  # explosion, blank-line insertion -- see CLAUDE.md "Black repo-wide reformat").
  # Missing `stages: [manual]` here previously meant this hook ran on every
  # commit and would silently reapply both excluded classes. Use
  # `python -m py_ci_shared.black_filtered_apply --write <files>` for the
  # sanctioned, filtered formatting pass instead of
  # `pre-commit run --hook-stage manual black`.
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3
        stages: [manual]

  # Black CHECK gate: this is the one that actually mirrors CI's black-filtered.yml (a real
  # blocking gate, no continue-on-error -- see .github/workflows/black-filtered.yml). Added
  # 2026-07-12: the raw ``black`` hook above is manual-only (correctly -- it would reapply the
  # excluded diff classes), but that previously left NO Black check running on commit at all --
  # only the warn-only ``format-lint-warn`` bundle below, which never blocks. Runs the exact
  # filtered ``--check`` command CI runs, same ``check-path: src/mlframe``, so a commit that
  # passes locally cannot fail CI's Black job and vice versa.
  - repo: local
    hooks:
      - id: black-filtered-blocking
        name: "black (filtered, blocking) -- mirrors CI black-filtered.yml"
        # Scoped to the files THIS commit touches (pass_filenames: true), not the whole src/mlframe
        # tree -- CI's black-filtered.yml still checks the full tree on every push, so a full-repo
        # backlog is still caught there; this local hook only needs to stop a commit from ADDING a
        # new violation, and scanning ~1300 files on every commit made local commits take minutes.
        entry: python -m py_ci_shared.black_filtered_apply --config pyproject.toml --check
        language: system
        types: [python]
        stages: [pre-commit]

  # Mypy: scoped to the full strict-mode beachhead per [tool.mypy.overrides] in pyproject.toml.
  # Expanding this files= regex further is gated on a separate review per the gradual-typing
  # policy in CONTRIBUTING.md. The old mypy.yml CI workflow that used to mirror this exactly was
  # retired 2026-07-12 -- the whole-project mypy-full.yml (0-error blocking gate) now supersedes
  # it, so there's no longer a second hand-maintained module list for this regex to drift against.
  #
  # CRITICAL: this regex must stay a superset of every module in [[tool.mypy.overrides]] with
  # disallow_untyped_defs=true (the actual beachhead). Found 2026-07-09 (CI/CD architecture
  # review): the beachhead had already expanded twice (calibration -> +safe_pickle ->
  # +_gpu_guard/_numba_params/rank_correlation/_core_precision_mape) without this regex ever
  # being updated -- 5 of 6 beachhead modules were invisible to this hook, so an edit to any of
  # them passed pre-commit locally and only failed in CI's mypy-beachhead job. See
  # tests/test_meta/test_precommit_mypy_beachhead_coverage.py for the meta-test that now pins
  # this regex against pyproject.toml's actual override list.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        files: '^(src/mlframe/calibration/|src/mlframe/utils/safe_pickle\.py$|src/mlframe/system/_gpu_guard\.py$|src/mlframe/metrics/(_numba_params|rank_correlation|_core_precision_mape)\.py$)'
        # --follow-imports=silent: this hook's isolated env has none of calibration's heavy
        # transitive deps installed (pandas/torch/lightning/numba/pyutilz), so default
        # follow-imports="normal" walks into every module they import, collapses each
        # missing-dep expression to Any, and reports noise from dozens of files never meant
        # to be covered by this beachhead (same fix applied to the now-retired mypy.yml, 2026-07-08).
        args: ['--follow-imports=silent']
        # Every dep here is EXACT-pinned, not range-pinned: an unpinned/range-pinned resolve
        # in this isolated hook env drifts silently over time (observed 2026-07-06: picked up
        # numpy 2.5.1, whose bundled .pyi stubs use PEP 695 `type` statements that mypy rejects
        # under our [tool.mypy] python_version="3.10" -- "Type statement is only supported in
        # Python 3.12 and greater" -- while the project's real env ran 2.3.x; observed again
        # 2026-07-08 via the mirrored mypy.yml CI step (since retired): identical command, 178 errors in CI vs.
        # 0 locally, traced to a different numpy/scipy/scikit-learn/pydantic/mypy combination
        # each side resolved). Versions below match the project's real dev env.
        additional_dependencies: ['numpy==2.3.5', 'scipy==1.17.1', 'scikit-learn==1.8.0', 'pydantic==2.13.4']

  - repo: local
    hooks:
      - id: mlframe-meta-tests
        name: "mlframe meta-tests (config / strategy / metric invariants)"
        # Wrapper sets NUMBA_DISABLE_JIT=1 + MLFRAME_SKIP_NUMBA_PREWARM=1
        # BEFORE pytest imports anything. Meta-tests are AST/config/structure
        # checks that never execute numba kernels, so the env knobs cost
        # nothing and avoid a CUDA-driver init hang observed in multi-agent
        # sessions on CUDA-equipped dev boxes. ``-p no:randomly`` (inside the
        # wrapper) keeps snapshot diff stable.
        entry: python scripts/run_meta_tests.py
        language: system
        types: [python]
        pass_filenames: false
        # Run on every commit that touches Python source. The meta-tests
        # are quick enough that the per-commit cost is fine; if a
        # contributor wants to skip in a hurry, ``git commit --no-verify``
        # is the one-time escape hatch.
        always_run: false
        stages: [pre-commit]

  # Real-bug gate: pyflakes (undefined names, redefinitions, undefined exports)
  # + syntax errors. Blocks the commit (exit 1 on finding any). False-positive
  # rate is near-zero after the de-star cleanup (F821/F822 are genuine bugs).
  # Stylistic rules (format, import order, naming) are WARN-ONLY via format-lint-warn.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        name: "ruff (real bugs block)"
        # The project's FULL configured select/ignore (pyproject.toml), minus C901 (complexity,
        # advisory-only). Closed to 0 findings on 2026-07-09 after fixing every RUF/G/ISC/PERF
        # finding. Mirrors CI's ``ruff check . --ignore C901`` exactly so a commit that passes
        # locally cannot fail CI and vice versa.
        #
        # CRITICAL: never use ``--select`` here. ``--select`` REPLACES the effective rule set
        # instead of narrowing pyproject.toml's configured select, silently dropping the
        # ``ignore`` list too (RUF001/002/003/022, ISC001, etc. would all reappear) and breaking
        # RUF100's "is this noqa still needed" determination (see CLAUDE.md's 2026-07-09 RUF100
        # incident). ``--ignore`` only ADDS to the configured ignore list, so it is safe.
        entry: python -m ruff check --ignore C901
        language: system
        types: [python]
        # pre-commit passes matching files as explicit CLI args, which BYPASSES ruff's own
        # top-level `exclude` list in pyproject.toml (explicit paths override `exclude`; only
        # `force-exclude = true`, which this repo does not set, would apply it to explicit args
        # too). Mirror that exclude list here at the pre-commit level so tests/scripts/legacy/
        # benchmarks/profiling stay out of this hook exactly as pyproject.toml intends -- found
        # 2026-07-09 while verifying the blocking-gate expansion locally (tests/ was silently
        # never covered, ~4600 findings under the current full select/ignore, wholly unrelated
        # to this repo's src/mlframe cleanup).
        exclude: (^|/)(tests|scripts|legacy|benchmarks|_benchmarks|profiling)/
        stages: [pre-commit]

  # Warn-only style gate: formatting + style lint (E/W/N/UP/I), never blocks.
  # Runs after the blocking gate. Wrapper script lives in the shared py_ci_shared
  # package (fingoldo/py-ci-shared) -- `pip install -e ".[dev]"` installs it.
  - repo: local
    hooks:
      - id: format-lint-warn
        name: "ruff format + style lint (warn-only)"
        entry: python -m py_ci_shared.format_warn
        language: system
        types: [python]
        verbose: true
        stages: [pre-commit]

  # Security-lint gate: bandit -ll (medium+ severity). Blocking since 2026-07-09 -- triaged to 0
  # findings (see the CI lint-blocking job), so this mirrors that CI gate exactly instead of only
  # warning locally and failing later in CI. Called directly (not through the warn-only wrapper
  # -- that one is py_ci_shared.bandit_warn, kept for repos still working down a backlog).
  # Scoped to changed files (2026-07-14): bandit's findings are per-file (no cross-file analysis
  # needed, unlike deptry's project-wide import graph), so -r's directory recursion is unneeded
  # once pre-commit passes the actual changed file list -- CI's lint-blocking job still runs the
  # true whole-project scan (-r src/mlframe) on every push, so pre-existing whole-repo findings
  # are still caught there.
  - repo: local
    hooks:
      - id: bandit-blocking
        name: "bandit security scan (blocking)"
        entry: python -m bandit -ll
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-commit]

  # Dead-code gate: vulture --min-confidence 80. Blocking since 2026-07-09 -- triaged to 0
  # findings (see the CI lint-blocking job). The whitelist stays local to this repo
  # (project-specific dynamic-dispatch names).
  - repo: local
    hooks:
      - id: vulture-blocking
        name: "vulture dead-code scan (blocking)"
        entry: python -m vulture src/mlframe scripts/vulture_whitelist.py --min-confidence 80
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

  # Docstring-coverage gate: 100% (see [tool.interrogate] in pyproject.toml). Blocking since
  # 2026-07-09, mirroring the CI lint-blocking job.
  # Scoped to changed files (2026-07-14): interrogate's coverage % is computed per invocation
  # over whatever paths it's given, so scoping to the changed files means a commit is only
  # responsible for ITS OWN files' docstring coverage, not the whole repo's pre-existing gaps
  # (matches the black/mypy changed-files precedent) -- CI's lint-blocking job still runs the
  # true whole-project --fail-under 100 src/mlframe on every push.
  - repo: local
    hooks:
      - id: interrogate-blocking
        name: "interrogate docstring coverage (blocking, 100%)"
        entry: python -m interrogate --fail-under 100
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-commit]

  # Dependency-drift gate: deptry (unused/missing/transitive). Blocking since 2026-07-09,
  # mirroring the CI lint-blocking job -- see [tool.deptry] for the per_rule_ignores this relies
  # on. Assumes the local dev env has the [all,dev] extras (+ sibling pyutilz) installed, same
  # assumption CI makes via its explicit install step; deptry's DEP001/DEP002/DEP003 are
  # meaningless without a real environment to check imports against.
  # NOT scoped to changed files (considered 2026-07-14, rejected): deptry's whole point is
  # cross-file -- "is dependency X imported ANYWHERE" / "is import Y declared ANYWHERE" requires
  # seeing every file's imports at once. Restricting the scan to just the touched files would
  # make it blind to legitimate uses elsewhere and produce false unused/missing findings.
  - repo: local
    hooks:
      - id: deptry-blocking
        name: "deptry dependency check (blocking)"
        entry: python -m deptry .
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Prose-typo gate: codespell. Blocking since 2026-07-09, mirroring the CI lint-blocking job
  # (config/ignore-words-list comes from [tool.codespell] in pyproject.toml, same as CI).
  # Scoped to changed files (2026-07-14): codespell checks each file's own prose independently
  # (no cross-file state), so a whole-tree scan on every commit was pure overhead -- CI's
  # lint-blocking job still runs the true whole-project scan on every push.
  - repo: local
    hooks:
      - id: codespell-blocking
        name: "codespell prose typo check (blocking)"
        entry: python -m codespell_lib --toml pyproject.toml
        language: system
        pass_filenames: true
        stages: [pre-commit]

  # Workflow-YAML style gate: yamllint. Blocking since 2026-07-09, mirroring the CI
  # lint-blocking job -- catches the SHA-pin comment-spacing / indentation class of nit before
  # it ever reaches a push, on the same two paths CI checks.
  - repo: local
    hooks:
      - id: yamllint-blocking
        name: "yamllint workflow files (blocking)"
        entry: python -m yamllint .github/workflows .pre-commit-config.yaml
        language: system
        pass_filenames: false
        # Only worth running when a workflow file or this config itself changed -- yamllint has
        # nothing to say about a commit that only touches src/mlframe.
        files: '^(\.github/workflows/.*\.ya?ml|\.pre-commit-config\.yaml)$'
        stages: [pre-commit]

  # Workflow-security gate: zizmor (unpinned actions, template-injection, excessive
  # permissions, credential persistence in .github/workflows/*.yml). Blocking since 2026-07-10
  # -- this repo's own workflows were triaged to 0 findings the same day CI's run-zizmor input
  # was flipped true (see ci.yml's lint-blocking call); mirrors that CI gate exactly.
  - repo: local
    hooks:
      - id: zizmor-blocking
        name: "zizmor workflow security scan (blocking)"
        entry: uvx zizmor .
        language: system
        pass_filenames: false
        files: '^\.github/workflows/.*\.ya?ml$'
        stages: [pre-commit]

  # Advisory-taste warn-only gate: unrestricted-select ruff (surfaces everything the blocking
  # gate's --ignore C901 hides) + mccabe complexity (C90) + pip-audit (dependency CVE feed).
  # Mirrors lint-advisory.yml's own posture exactly -- everything here is continue-on-error in CI
  # (design taste / a feed whose fix isn't always on your own timeline, not a correctness bug),
  # so this hook never blocks either; it just surfaces the same signal locally instead of only in CI.
  - repo: local
    hooks:
      - id: lint-advisory-warn
        name: "ruff (full-select) + mccabe complexity + pip-audit (advisory, warn-only)"
        entry: python -m py_ci_shared.advisory_warn --src-path src/mlframe
        language: system
        types: [python]
        verbose: true
        stages: [pre-commit]

  # Optional: a "fast" alias that runs the static (non-Hypothesis) meta-
  # tests only — useful for ``pre-commit run --hook-stage=manual fast-meta``
  # in tight inner-loop work.
  - repo: local
    hooks:
      - id: mlframe-meta-tests-static-only
        name: "mlframe meta-tests (static checks only — skip Hypothesis)"
        entry: pytest tests/test_meta/ --no-cov -p no:randomly -q -x --deselect tests/test_meta/test_metric_invariants.py --deselect tests/test_meta/test_utility_fuzz.py --deselect tests/test_meta/test_config_round_trip.py
        language: system
        types: [python]
        pass_filenames: false
        always_run: false
        stages: [manual]

  # Keep the committed anonymized default kernel-tuning JSON in sync. On commit
  # this runs --check ONLY (skip_existing): it reads every kernel's live
  # code_version + the committed file and FAILS the commit if they drifted
  # (kernel edited / added / removed but defaults not regenerated). It never
  # sweeps (PYUTILZ_KERNEL_DISABLE_SWEEP=1 in the wrapper) so the commit is fast.
  #
  # On drift:
  #   * Regenerate (may sweep newly-changed kernels): mlframe-gen-default-tuning
  #     then `git add src/mlframe/feature_selection/_benchmarks/default_kernel_tuning.json`
  #   * Or skip this commit's hooks: git commit --no-verify
  #
  # Runs only when Python under src/mlframe changes (a code_version can only move
  # if kernel source moved); pure-doc / test commits don't pay the import cost.
  - repo: local
    hooks:
      - id: gen-default-tuning-check
        name: "default kernel-tuning JSON in sync (--check, no sweep)"
        entry: python scripts/check_default_tuning.py
        language: system
        files: '^src/mlframe/.*\.py$'
        pass_filenames: false
        always_run: false
        stages: [pre-commit]

      # MANUAL fast stage: actually (re)generate the defaults. Use after a kernel
      # edit moved a code_version:  pre-commit run --hook-stage manual gen-default-tuning
      # (equivalent to running ``mlframe-gen-default-tuning`` directly). This MAY
      # run a synchronous sweep for any kernel whose code_version changed, so it
      # is manual-only — never on the commit path.
      - id: gen-default-tuning
        name: "regenerate default kernel-tuning JSON (manual; may sweep)"
        entry: mlframe-gen-default-tuning
        language: system
        pass_filenames: false
        always_run: false
        stages: [manual]

  # Mypy on the files THIS commit touches. Mirrors CI's mypy-full.yml, which is BLOCKING for this
  # repo (advisory: false, closed to 0 backlog 2026-07-08) -- so this now runs on every commit too
  # instead of only in CI. Flipped from ``stages: [manual]`` 2026-07-12: that setting meant a
  # commit with a whole-project mypy error would pass locally and only fail once pushed to CI,
  # exactly the gap this policy pass exists to close.
  # Scoped to changed files (2026-07-13): mypy still resolves each changed file's full transitive
  # import graph (so cross-file errors it CAUSES are still caught), it just doesn't re-check every
  # unrelated file in the other ~1300 -- CI's mypy-full.yml still runs the true whole-project check
  # on every push, so a pre-existing whole-repo issue unrelated to this commit is still caught
  # there. Local commits going from minutes to seconds is the point of this change.
  - repo: https://github.com/fingoldo/py-ci-shared
    rev: v1.0.0
    hooks:
      - id: mypy-full-manual
        pass_filenames: true
        # The shared hook definition itself hardcodes stages: [manual] (it's a generic hook
        # meant for repos where mypy-full is advisory, e.g. pyutilz) -- this repo-local override
        # is what actually makes it run on every commit, since mlframe's mypy-full.yml IS
        # blocking (advisory: false) unlike pyutilz's.
        stages: [pre-commit]
