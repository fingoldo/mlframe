[tool.interrogate]
# Test-scoped interrogate config -- separate from the root pyproject.toml's [tool.interrogate],
# which explicitly excludes "tests" and enforces 100% on src/mlframe only. Invoke with:
#     python -m interrogate tests/ -c tests/interrogate.toml
#
# Whole-tree coverage reached 100.0% on 2026-07-18 via a full docstring-authoring campaign
# (started at 53.1% on 2026-07-17). fail-under = 100 is a real, currently-met gate, not
# aspirational -- every module/class/function under tests/ now carries a one-line docstring.
fail-under = 100
ignore-init-method = true
ignore-init-module = true
ignore-magic = true
ignore-private = true
verbose = 1
