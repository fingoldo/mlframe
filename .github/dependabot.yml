version: 2
updates:
  # Keep GitHub Actions pinned-tags fresh and surface supply-chain advisories.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    cooldown:
      default-days: 7

  # Keep pip dependencies (~150+) from drifting behind on security patches. Was disabled
  # 2026-07-10 (open-pull-requests-limit: 0) because every PR/branch this ecosystem opens
  # triggers the repo's own CI matrix (ci.yml/Black/MyPy) on push, contributing to the account's
  # Actions-minutes exhaustion alongside the Windows/macOS legs (see ci.yml's matrix comment).
  # Re-enabled at a small limit now that those Windows/macOS legs and the nightly numba-coverage
  # job (numba-coverage.yml) have both since been dropped/gated, reclaiming most of the budget the
  # original disable blamed; the pip ecosystem was the only automated security-patch signal this
  # repo had (dependency-review.yml only inspects NEW deps in an incoming PR's diff; pip-audit in
  # lint-advisory.yml is continue-on-error and never opens a fix PR on its own).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    cooldown:
      default-days: 7
