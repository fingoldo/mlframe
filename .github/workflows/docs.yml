name: docs

# Build the MkDocs site on every PR (validation) and deploy it to GitHub Pages
# on pushes to master. Enable Pages for the repo with "GitHub Actions" as the
# source for the deploy job to publish. Extracted to fingoldo/py-ci-shared (2026-07-09).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    uses: fingoldo/py-ci-shared/.github/workflows/docs.yml@master
    with:
      default-branch: master
      # composite_targets_tutorial.ipynb imports mlframe; install the package so a future flip
      # of mkdocs-jupyter `execute: false` -> true keeps building. Notebooks render from stored
      # outputs today (execute: false in mkdocs.yml), so --no-deps suffices: it registers
      # mlframe without resolving its deps (pyutilz is first-party, absent from PyPI, so a full
      # resolve fails).
      install-command: |
        pip install -e . --no-deps
        pip install "mkdocs-material>=9.5" "mkdocs-jupyter>=0.24"
