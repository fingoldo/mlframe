name: numba-coverage-nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  numba-disabled-coverage:
    name: pytest with NUMBA_DISABLE_JIT=1 (kernel-body coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    env:
      NUMBA_DISABLE_JIT: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Clone & install pyutilz (sibling dependency)
        run: |
          git clone --depth 1 https://github.com/fingoldo/pyutilz.git
          pip install "./pyutilz[system,pandas,polars,database]"

      - name: Install mlframe with all runtime extras + dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Show installed versions
        run: |
          python -c "import mlframe; print('mlframe', mlframe.__version__)"
          python -c "import numba; print('numba', numba.__version__)"
          python -c "import os; print('NUMBA_DISABLE_JIT =', os.environ.get('NUMBA_DISABLE_JIT'))"

      - name: Run kernel-heavy test suites with NUMBA_DISABLE_JIT=1
        run: |
          pytest -m "not slow and not gpu and not multigpu" \
            -n auto \
            --cov=src/mlframe \
            --cov-report=xml \
            --cov-report=term-missing \
            -p no:randomly \
            --timeout=600 \
            tests/feature_engineering/ \
            tests/feature_selection/ \
            tests/metrics/ \
            tests/training/

      - name: Upload coverage XML as artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-numba-disabled
          path: coverage.xml

      - name: Upload coverage to Codecov (numba-disabled flag)
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage.xml
          flags: numba-disabled
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
