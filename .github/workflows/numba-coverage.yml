name: numba-coverage-nightly

# Disabled 2026-07-10: this nightly (340min timeout, full feature_engineering/feature_selection/
# metrics/training suites under NUMBA_DISABLE_JIT=1) was part of what exhausted the account's
# monthly free GitHub Actions minutes and left every workflow, in every repo on the account, stuck
# queued. The cron TRIGGER stays declared (test_numba_coverage_workflow_exists.py's
# test_numba_coverage_workflow_has_nightly_cron pins its presence -- deleting it silently regresses
# the njit-kernel-body coverage-blind-spot guard this workflow exists for, see
# reference_numba_coverage_blind), but the job itself is gated behind `if: inputs.run`, which is
# only ever set by a workflow_dispatch invocation -- `github.event.inputs` is empty for a
# schedule-triggered run, so `inputs.run` evaluates to falsy and the 03:00 UTC cron fires the
# workflow but the job body never actually runs (0 minutes spent) until someone flips the input on
# via a manual "Run workflow" click. Flip the input default to true (or delete the guard) to
# restore real nightly runs once budget allows.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      run:
        description: "Actually run the nightly (disabled by default -- see file header comment)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  numba-disabled-coverage:
    if: inputs.run
    name: pytest with NUMBA_DISABLE_JIT=1 (kernel-body coverage)
    runs-on: ubuntu-latest
    # 340 (near the 360min hosted-runner hard ceiling): under NUMBA_DISABLE_JIT=1, kernel-heavy
    # fixtures (permutation-null loops, discretization, orthogonal-basis FE) run 10-1000x slower
    # than under normal JIT, since the whole point of the run is to make @njit bodies visible to
    # coverage.py by NOT compiling them. 120min was consistently insufficient (10 consecutive
    # nightly failures/cancellations 2026-06-29..2026-07-08 before this fix).
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    env:
      NUMBA_DISABLE_JIT: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Clone & install pyutilz (sibling dependency)
        run: |
          git clone --depth 1 https://github.com/fingoldo/pyutilz.git
          pip install "./pyutilz[system,pandas,polars,database]"

      - name: Install mlframe with all runtime extras + dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Show installed versions
        run: |
          python -c "import mlframe; print('mlframe', mlframe.__version__)"
          python -c "import numba; print('numba', numba.__version__)"
          python -c "import os; print('NUMBA_DISABLE_JIT =', os.environ.get('NUMBA_DISABLE_JIT'))"

      - name: Run kernel-heavy test suites with NUMBA_DISABLE_JIT=1
        run: |
          # -n 4 (not auto): xdist workers here each run full MRMR.fit() calls that internally
          # spawn their own joblib parallelism; `-n auto` (one worker per core) oversubscribed
          # the runner and crashed a worker mid-run (pytest-xdist INTERNALERROR, 2026-07-08).
          # --ignore=biz_val: those 50 files are quantitative ML-trick accuracy tests (see
          # CLAUDE.md's biz_value section), already covered under normal JIT by the main CI
          # matrix; running them here just burns the nightly's time budget on multi-minute
          # full-model fits without adding kernel-BODY coverage the non-biz_val unit tests don't
          # already provide.
          pytest -m "not slow and not gpu and not multigpu" \
            -n 4 \
            --cov=src/mlframe \
            --cov-report=xml \
            --cov-report=term-missing \
            -p no:randomly \
            --timeout=1200 \
            --ignore=tests/feature_selection/biz_val \
            tests/feature_engineering/ \
            tests/feature_selection/ \
            tests/metrics/ \
            tests/training/

      - name: Upload coverage XML as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: coverage-numba-disabled
          path: coverage.xml

      - name: Upload coverage to Codecov (numba-disabled flag)
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
        if: success()
        with:
          file: ./coverage.xml
          flags: numba-disabled
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

