name: release

# Publishes to PyPI on a published GitHub Release (or a v* tag) using PyPI
# Trusted Publishing (OIDC) — no API token is stored as a secret.
#
# One-time setup on PyPI: add a Trusted Publisher for this repo pointing at
# this workflow file (release.yml) and the "pypi" environment below.
#
# NOTE: a successful upload requires the runtime dependency `pyutilz` to be
# available on PyPI; until then this workflow builds and validates but the
# upload step will be the gating action to run only once that is true.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    # Every other job in this repo's workflows sets an explicit timeout-minutes; this one job was
    # the sole omission (2026-07-18 architecture review). Low risk in practice (build+twine-check
    # is fast and deterministic) but inconsistent with the rest of the codebase's own discipline.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: false

      # Guard against a tag/version mismatch: the release fires on a `v*` tag but
      # the wheel version comes from `mlframe.__version__` (version.py). Publishing
      # a wheel whose version disagrees with the tag is silent and unrecoverable
      # on PyPI, so fail fast. Skipped for manual dispatch runs (no tag ref).
      - name: Assert git tag matches package version
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "ns={}; exec(open('src/mlframe/version.py').read(), ns); print(ns['__version__'])")
          echo "tag=$TAG package=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::git tag ($TAG) != mlframe.__version__ ($PKG)"; exit 1; }

      - name: Build distributions
        run: uv build

      - name: Verify distributions with twine
        run: uvx twine check dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/mlframe
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
