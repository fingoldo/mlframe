name: Black

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Without this, every push queues an independent run that's never superseded --
# on a repo with this much push frequency (concurrent /loop sessions) the queue
# grows unboundedly and starves the runner pool for every other workflow (2026-07-06).
# Only the LATEST push's check matters, so cancel superseded ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Extracted to fingoldo/py-ci-shared (2026-07-09): identical logic to pyutilz's own Black
# workflow, script now lives in the shared py_ci_shared package instead of scripts/ here.
jobs:
  black:
    permissions:
      contents: read
    uses: fingoldo/py-ci-shared/.github/workflows/black-filtered.yml@76f6606202f0db95dfa87d67010f64c9e6db8574  # v1.0.0
    with:
      check-path: src/mlframe
