name: Black (filtered)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Without this, every push queues an independent run that's never superseded --
# on a repo with this much push frequency (concurrent /loop sessions) the queue
# grows unboundedly and starves the runner pool for every other workflow (2026-07-06).
# Only the LATEST push's check matters, so cancel superseded ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  black-filtered:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # uvx runs black from uv's cache with no explicit install step.
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Flags any Black finding EXCEPT blank-line insertion and arg/import-list
      # explosion, which the project deliberately keeps -- see
      # scripts/black_filtered_apply.py docstring for the excluded-class rationale.
      - name: Black format check, filtered
        run: python scripts/black_filtered_apply.py --config pyproject.toml --check src/mlframe
        env:
          BLACK_CMD: "uvx black"
