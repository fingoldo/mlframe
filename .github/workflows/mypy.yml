name: MyPy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Extracted to fingoldo/py-ci-shared (2026-07-09): the strict-mode-beachhead mechanism
# (exact dep pins, --follow-imports=silent, explicit module list) is identical to pyutilz's
# own mypy.yml -- see that reusable workflow's header comment for the full rationale
# (why exact pins, why --follow-imports=silent).
jobs:
  mypy:
    uses: fingoldo/py-ci-shared/.github/workflows/mypy-beachhead.yml@v1.0.0
    with:
      mypy-version: "2.1.0"
      extra-deps: |
        numpy==2.3.5
        scipy==1.17.1
        scikit-learn==1.8.0
        pydantic==2.13.4
      modules: |
        src/mlframe/system/_gpu_guard.py
        src/mlframe/metrics/_numba_params.py
        src/mlframe/metrics/rank_correlation.py
        src/mlframe/metrics/_core_precision_mape.py
        src/mlframe/utils/safe_pickle.py
        src/mlframe/calibration
