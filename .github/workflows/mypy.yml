name: MyPy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Mirrors the pre-commit mypy hook's strict-mode beachhead (see
      # [tool.mypy.overrides] in pyproject.toml) so a commit that passes locally
      # cannot silently regress once pushed. numpy pinned <2.5 to match the
      # pre-commit hook's additional_dependencies -- 2.5+'s bundled .pyi stubs use
      # PEP 695 `type` statements that mypy rejects under python_version="3.10"
      # ("Type statement is only supported in Python 3.12 and greater"), and
      # uvx --with resolves unpinned deps fresh each run.
      - name: MyPy (strict-mode beachhead)
        run: >
          uvx --with "numpy<2.5" --with scipy --with scikit-learn --with pydantic mypy
          src/mlframe/system/_gpu_guard.py
          src/mlframe/metrics/_numba_params.py
          src/mlframe/metrics/rank_correlation.py
          src/mlframe/metrics/_core_precision_mape.py
          src/mlframe/utils/safe_pickle.py
          src/mlframe/calibration
