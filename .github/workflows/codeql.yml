name: CodeQL

# SAST scan (dataflow analysis) -- complements bandit's AST-pattern rules, which catches a
# different, overlapping-but-not-identical bug class. Added 2026-07-18 CI/CD architecture review:
# table-stakes for a repo already treating CI security seriously (zizmor, bandit, codespell
# already wired in as blocking gates), free for public repos, near-zero maintenance once wired.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 7 * * 3"  # weekly, Wednesday 07:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@bb16b9baa2ec4010b29f5c606d57d01190139edd  # v4.37.1
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@bb16b9baa2ec4010b29f5c606d57d01190139edd  # v4.37.1
        with:
          category: "/language:python"
