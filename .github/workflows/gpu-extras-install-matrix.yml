name: GPU-extras install matrix (CPU runners)

# Maps which (Python, CUDA extra) combinations actually RESOLVE + import on free GitHub-hosted
# CPU runners. This does NOT run GPU kernels (hosted runners have no GPU) -- it verifies wheel
# availability + importability, which is the layer that catches issues like "cupy ships no
# cuda11x wheel for Python 3.13+/cupy 14". Actual GPU kernel execution lives in gpu-matrix.yml
# (self-hosted GPU runner).
#
# cupy imports fine on a CPU box (the wheel bundles the CUDA runtime; it only fails when you
# touch the device), so `pip install ...; python -c "import cupy"` is a valid resolvability gate.

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "pyproject.toml"
      - ".github/workflows/gpu-extras-install-matrix.yml"
  schedule:
    # Weekly: catch the ecosystem publishing (or yanking) cudaNNx wheels for new Python.
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  resolve:
    name: ${{ matrix.extra }} @ py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # cupy ships cuda11x wheels only through cupy 13.x on Python <=3.12; there is no cuda11x
    # wheel for Python 3.13+/cupy 14, so those rows are expected to fail resolution -- mark them
    # experimental so the matrix records the fact without turning the check red.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        extra: ["gpu", "gpu-cuda11"]
        include:
          - extra: "gpu-cuda11"
            python-version: "3.13"
            experimental: true
          - extra: "gpu-cuda11"
            python-version: "3.14"
            experimental: true

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Clone & install pyutilz (sibling dependency, not on PyPI)
        # mlframe requires pyutilz>=1.0.0, which is not published; without installing it from source first
        # `pip install -e .` fails resolution with "No matching distribution found for pyutilz>=1.0.0".
        run: |
          git clone --depth 1 https://github.com/fingoldo/pyutilz.git
          pip install "./pyutilz[system,pandas,polars,database]"

      - name: Resolve + install the GPU extra (no GPU execution)
        run: |
          python -m pip install --upgrade pip
          # Install ONLY the GPU extra's deps (not the full [all]) to isolate the wheel-resolution signal.
          # pyutilz is already satisfied from the clone above, so this resolves just the GPU wheels from PyPI.
          pip install -e ".[${{ matrix.extra }}]"

      - name: Import cupy (resolvability gate; no device op)
        run: |
          python -c "import cupy; print('cupy', cupy.__version__, '-- import OK on CPU runner (no device op)')"

      - name: Report resolved versions
        if: always()
        run: |
          python -m pip list | grep -iE "cupy|nvidia-cuda|gpu-info" || true
