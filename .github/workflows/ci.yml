name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Reverted 2026-07-09: cancel-in-progress:false for push (kept only for PR) was meant to let a
  # push-to-master run survive to completion so codecov gets an upload (0% codecov incident,
  # 2026-0x-xx: 42 cancelled / 7 failed / 0 succeeded across 50 consecutive pushes). Under today's
  # push volume that "fix" just traded one failure mode for a worse one: non-cancelling runs queue
  # up FIFO behind the concurrency group with nothing to clear the backlog, so runs sit queued for
  # 30+ minutes and STILL never reach completion -- 0% codecov either way, but now nothing finishes
  # at all (confirmed on mypy-full.yml's identical pattern the same day). cancel-in-progress:true
  # at least lets the latest commit's run actually start and finish instead of rotting in queue.
  cancel-in-progress: true

jobs:
  test:
    name: pytest ${{ matrix.python-version }} on ${{ matrix.os }} (shard ${{ matrix.group }}/${{ matrix.splits || '8' }})
    runs-on: ${{ matrix.os }}
    env:
      # Persist numba's on-disk JIT cache across runs AND shards (see the cache step below). Without it numba
      # recompiles the ~430 cache=True kernels cold on every shard of every run; measured locally, ~80% of a
      # feature_selection test file's cold time is first-call compilation (64.6s cold -> 11.9s warm), which is
      # what pushed each shard past the 120-min cap. A persisted cache makes warm shards ~5x faster to compile.
      NUMBA_CACHE_DIR: ${{ github.workspace }}/.numba-cache
    # A GitHub-hosted runner has only 2 vCPUs and the suite is large. Two costs dominate per shard: numba
    # cold-JIT compilation (now cached across runs+shards via NUMBA_CACHE_DIR) and model-training tests. We
    # shard 8 ways via pytest-split (`--splits 8 --group N`) so even a cold shard (which must populate the
    # cache) finishes under the cap; warm shards are far faster. timeout-minutes is headroom, not a budget.
    timeout-minutes: 120
    # Newest-Python rows are marked experimental so a single optional-extra
    # that has not yet published a cp314 wheel does not turn a required check
    # red while the ecosystem finishes catching up. The core stack (numpy /
    # numba / polars / sklearn / pyarrow / pydantic) already ships cp314 wheels.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        # Linux rows 3.9-3.13 are required (blocking). The [all] extra installs
        # on 3.13 thanks to the tool.uv `ortools>=9.12` override (see pyproject).
        # Each (os, python) is sharded 8 ways via pytest-split so even a cold
        # shard (numba JIT not yet cached) finishes inside the 120-min cap; once
        # the numba cache is warm each shard is far faster.
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        group: ["1", "2", "3", "4", "5", "6", "7", "8"]
        include:
          # Representative non-Linux coverage, also sharded 8 ways. Windows
          # drops coverage (pytest-cov .coverage lock PermissionError); macOS
          # arm64 catches Darwin-specific polars/numba/BLAS regressions.
          - { os: windows-latest, python-version: "3.11", group: "1" }
          - { os: windows-latest, python-version: "3.11", group: "2" }
          - { os: windows-latest, python-version: "3.11", group: "3" }
          - { os: windows-latest, python-version: "3.11", group: "4" }
          - { os: windows-latest, python-version: "3.11", group: "5" }
          - { os: windows-latest, python-version: "3.11", group: "6" }
          - { os: windows-latest, python-version: "3.11", group: "7" }
          - { os: windows-latest, python-version: "3.11", group: "8" }
          - { os: windows-latest, python-version: "3.13", group: "1" }
          - { os: windows-latest, python-version: "3.13", group: "2" }
          - { os: windows-latest, python-version: "3.13", group: "3" }
          - { os: windows-latest, python-version: "3.13", group: "4" }
          - { os: windows-latest, python-version: "3.13", group: "5" }
          - { os: windows-latest, python-version: "3.13", group: "6" }
          - { os: windows-latest, python-version: "3.13", group: "7" }
          - { os: windows-latest, python-version: "3.13", group: "8" }
          - { os: macos-latest, python-version: "3.11", group: "1" }
          - { os: macos-latest, python-version: "3.11", group: "2" }
          - { os: macos-latest, python-version: "3.11", group: "3" }
          - { os: macos-latest, python-version: "3.11", group: "4" }
          - { os: macos-latest, python-version: "3.11", group: "5" }
          - { os: macos-latest, python-version: "3.11", group: "6" }
          - { os: macos-latest, python-version: "3.11", group: "7" }
          - { os: macos-latest, python-version: "3.11", group: "8" }
          # Python 3.14 stays non-blocking (experimental): the optbinning->ortools
          # blocker is gone (override above), but the heavy [all] stack (torch /
          # numba / ...) does not yet reliably ship cp314 wheels. Run it as a
          # single unsharded full-suite smoke (splits=1) so a partial shard never
          # masks a 3.14-specific break; flip to required + sharded once cp314
          # wheels are universal.
          - { os: ubuntu-latest, python-version: "3.14", experimental: true, splits: "1", group: "1" }
          - { os: windows-latest, python-version: "3.14", experimental: true, splits: "1", group: "1" }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The [all,dev] extras union resolves to a ~5 GB, several-hundred-package
      # graph (torch / mlflow / lightning / gpytorch / pysr+julia / ...). pip's
      # backtracking resolver hits `error: resolution-too-deep` on this graph
      # (py3.13/3.14) and, where it does resolve, the install alone burns ~25 min
      # of the 90-min job budget so install+test overruns the cap. uv's resolver
      # has no depth ceiling and installs in parallel (~10x faster), fixing both.
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install libomp (macOS LightGBM OpenMP runtime)
        # LightGBM's macOS wheel links against ``@rpath/libomp.dylib``. The
        # GitHub-hosted macos-latest runner does not ship libomp by default;
        # ``import lightgbm`` fails at collection time with ``OSError:
        # Library not loaded: @rpath/libomp.dylib``. Homebrew's libomp
        # package provides the dylib and the linker can resolve it via the
        # rpath set by the wheel.
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Clone & install pyutilz + mlframe in one uv resolution
        # pyutilz is a first-party sibling dep not yet on PyPI: clone it and install from the local path so
        # mlframe's `pyutilz>=1.0.0` resolves to it (mlframe requires plain pyutilz, no extras, so the explicit
        # ./pyutilz[...] target fully controls pyutilz's extras). Install the narrow pyutilz extras -- EXCLUDING
        # [nlp] (spacy>=3.0 -> thinc>=8.3.12 needs py>=3.10, and the matrix still covers py3.9) -- and mlframe's
        # [all,dev] union (mlframe's submodules have unguarded top-level heavy imports, so [all] keeps test
        # collection from blowing up on ModuleNotFoundError) in a SINGLE `uv pip install`.
        run: |
          git clone --depth 1 https://github.com/fingoldo/pyutilz.git
          uv pip install --system "./pyutilz[system,pandas,polars,database]" -e ".[all,dev]"

      - name: Restore numba JIT cache
        # numba's per-kernel disk cache (keyed internally by source + numba version) is restored into
        # NUMBA_CACHE_DIR so warm shards skip recompilation. The exact key hits when src is unchanged; the
        # restore-keys prefix falls back to the newest prior cache (numba then recompiles only changed kernels,
        # so a stale restore is still a large net win). All shards of one (os, python) share the key, so the
        # first to finish populates it for the rest. Save happens in the post-job step.
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.numba-cache
          key: numba-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('src/**/*.py') }}
          restore-keys: |
            numba-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Show installed versions
        run: |
          python -c "import mlframe; print('mlframe', mlframe.__version__)"
          python -c "import sklearn; print('sklearn', sklearn.__version__)"
          python -c "import numpy; print('numpy', numpy.__version__)"

      # On Windows, pytest-cov can hit a PermissionError on .coverage file locks
      # (see project memory `feedback_pytest_no_cov`); drop coverage there.
      - name: Run tests (Linux, with coverage)
        if: runner.os == 'Linux'
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest -m "not slow and not gpu and not multigpu" \
            --splits ${{ matrix.splits || '8' }} --group ${{ matrix.group }} \
            -n auto \
            --cov=src/mlframe \
            --cov-report=xml \
            --cov-report=term-missing \
            -p no:randomly \
            --timeout=300

      - name: Run tests (Windows, no coverage)
        if: runner.os == 'Windows'
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest -m "not slow and not gpu and not multigpu and not linux_only" --splits ${{ matrix.splits || '8' }} --group ${{ matrix.group }} --no-cov -n auto -p no:randomly --timeout=300

      # macOS path: skip linux_only markers; no coverage to keep parity with Windows lightweight job.
      - name: Run tests (macOS, no coverage)
        if: runner.os == 'macOS'
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest -m "not slow and not gpu and not multigpu and not linux_only and not windows_only" --splits ${{ matrix.splits || '8' }} --group ${{ matrix.group }} --no-cov -n auto -p no:randomly --timeout=300

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        # (success() || failure()): a test failure in this shard (even one unrelated to coverage, e.g. a
        # meta-test) otherwise skips this step by GitHub Actions' default "only if prior steps succeeded"
        # rule, so codecov never sees that shard's coverage.xml and the merged report stays incomplete --
        # observed as the badge never updating despite runs completing.
        if: (matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11') && (success() || failure())
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: lint + security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # uvx runs each tool from uv's cache with no explicit install step;
      # nothing to resolve into an environment.
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Blocking gate: the project's FULL configured select/ignore (pyproject.toml), minus C901
      # (complexity, kept advisory-only -- see the dedicated step below). Closed to 0 findings on
      # 2026-07-09 after fixing every RUF/G/ISC/PERF finding (previously advisory-only alongside
      # C90). Mirrors the pre-commit "ruff (real bugs block)" hook exactly (same command) so a
      # commit that passes locally cannot fail this check and vice versa.
      #
      # CRITICAL: do NOT use `--select ...` here or in the pre-commit hook. `--select` REPLACES
      # the effective rule set rather than narrowing pyproject.toml's configured select, which
      # silently drops the `ignore` list too (RUF001/002/003/022, ISC001, etc. would all
      # reappear) and breaks RUF100's "is this noqa still needed" determination (it evaluates
      # against whatever rule set is active in THIS invocation -- see the CLAUDE.md section on
      # the 2026-07-09 RUF100 incident). `--ignore` only ADDS to the configured ignore list, so
      # it is safe to use here.
      - name: Ruff (real bugs - blocking)
        run: uvx ruff check . --ignore C901

      - name: Run ruff (full - advisory)
        run: uvx ruff check src/mlframe
        continue-on-error: true

      # Advisory-only: cyclomatic complexity (mccabe). Not a blocking gate -- at ruff's
      # default threshold this repo has ~850 findings, dominated by the monolith files
      # CLAUDE.md's "Build new code in focused submodules" section already tracks
      # (_fit_impl_core, _mrmr_class). This makes that existing carve-before-900-LOC
      # discipline measurable rather than adding a new hard requirement.
      - name: Ruff mccabe complexity (advisory)
        run: uvx ruff check src/mlframe --select C90 --statistics
        continue-on-error: true

      # Advisory: prose typo scan. This codebase carries an unusually large volume of
      # long inline rationale comments (CLAUDE.md's 160-char-comment convention) --
      # real hit-surface for genuine typos. [tool.codespell] in pyproject.toml is the
      # single source of truth for the ignore-words-list (legitimate ML/numeric jargon
      # and identifier-fragment false positives that would otherwise flag).
      - name: Codespell (advisory)
        run: uvx codespell --toml pyproject.toml src/mlframe
        continue-on-error: true

      # deptry NOT wired in as a CI step yet: a local dry run against [tool.deptry] below
      # produced ~37k DEP001 findings, dominated by PyPI-name-vs-import-name mismatches
      # (scikit-learn -> sklearn, etc.) deptry needs an explicit package_module_name_map
      # for -- broken signal, not advisory noise. [tool.deptry] config is left in
      # pyproject.toml so `uvx deptry .` is available for a deliberate local tuning pass;
      # add the CI step once that mapping exists and the finding count is sane.

      # Advisory: general YAML style/schema hygiene, complementary to actionlint's
      # GH-Actions-semantic checks (contexts, expressions) which don't cover generic
      # indentation/duplicate-key/trailing-whitespace issues.
      - name: yamllint workflow files (advisory)
        run: uvx yamllint .github/workflows .pre-commit-config.yaml
        continue-on-error: true

      # MyPy strict-mode beachhead moved to its own workflow (mypy.yml) so it gets
      # an independent, honest badge instead of being buried as a step inside this
      # combined lint job.

      - name: Run bandit security scan
        run: uvx bandit -r src/mlframe -ll -f json -o bandit-report.json
        continue-on-error: true

      - name: Upload bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      # Blocking: mirrors the pre-commit actionlint hook so a workflow-file bug
      # (bad expression, duplicate key, unknown runner label, shell-syntax error
      # in a run: block) can't reach master even via --no-verify. Custom
      # self-hosted runner labels are allow-listed in .github/actionlint.yaml.
      - name: Actionlint (workflow files)
        run: uvx --from actionlint-py actionlint

      # Advisory: dead-code scan. Real false-positive rate on dynamic-dispatch
      # code (lazy-import proxies, pydantic fields, pytest fixtures) makes this
      # unsuitable as a blocking gate; mirrors the bandit step's posture.
      - name: Vulture dead-code scan
        run: uvx vulture src/mlframe scripts/vulture_whitelist.py --min-confidence 80
        continue-on-error: true

      # Advisory: known-vulnerability scan against installed dependency versions
      # (bandit only checks code PATTERNS, not whether a pinned dependency has a
      # published CVE -- a different and complementary risk class).
      - name: pip-audit dependency vulnerability scan
        run: uvx pip-audit --desc -f json -o pip-audit-report.json || true
        continue-on-error: true

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  build:
    name: build sdist + wheel + install smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build distributions
        run: uv build

      - name: Verify distributions with twine
        run: uvx twine check dist/*

      # Install the BUILT wheel (not the editable checkout) into a clean venv
      # to confirm package layout, MANIFEST.in, py.typed, and __init__.py
      # exports are all wired so an end user's `pip install mlframe` works.
      - name: Install wheel + smoke import
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install "pyutilz @ git+https://github.com/fingoldo/pyutilz.git"
          /tmp/smoke/bin/pip install dist/*.whl
          # Assert the PEP 561 py.typed marker actually shipped in the wheel so a
          # package-data regression (dropping typing support) fails the build.
          python -c "import zipfile, glob, sys; w = glob.glob('dist/*.whl')[0]; names = zipfile.ZipFile(w).namelist(); sys.exit('py.typed missing from wheel' if 'mlframe/py.typed' not in names else 0)"
          /tmp/smoke/bin/python -c "import mlframe; print('mlframe', mlframe.__version__, 'at', mlframe.__file__)"
          /tmp/smoke/bin/python -c "from mlframe.metrics.core import *; from mlframe.training import train_and_evaluate_model; from mlframe.models.ensembling import *; from mlframe.calibration.quality import *; print('smoke OK')"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
