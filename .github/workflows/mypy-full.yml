name: MyPy

# Whole-project mypy check (the fast strict-mode beachhead workflow was retired). Extracted to
# fingoldo/py-ci-shared (2026-07-09); the install-command below mirrors ci.yml's `test` job
# install step PLUS [gpu] (cupy/numba.cuda) -- mypy needs cupy/numba.cuda's real stubs to
# type-check the GPU-optional code paths (``try: import cupy as cp / except ImportError: cp =
# None``); without them every such module mis-resolves the fallback branch as a type error
# (confirmed 2026-07-08: 48 errors in 21 files, all numba.cuda/cupy-shaped, with [gpu] excluded).
# cupy imports fine on a GPU-less CPU runner -- it only fails when you actually touch the device
# (see gpu-extras-install-matrix.yml) -- so this is safe on ubuntu-latest despite there being no
# GPU here. `advisory: false` because this backlog was closed to 0 as of 2026-07-08 -- this is a
# real blocking gate, not advisory (see the reusable workflow's header comment for why that's a
# per-repo choice, never a hardcoded default).

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mypy-full:
    permissions:
      contents: read
    uses: fingoldo/py-ci-shared/.github/workflows/mypy-full.yml@f26052fd4fee0d667aa6f4c3290d77e7ca6c1c06  # v1.2.0
    with:
      package-name: mlframe
      mypy-version: "2.1.0"
      advisory: false
      install-command: |
        git clone --depth 1 https://github.com/fingoldo/pyutilz.git
        uv pip install --system "./pyutilz[system,pandas,polars,database]" -e ".[all,dev,gpu]"
