# Sklearn-version matrix CI for composite-target tests.
#
# Runs the composite-target test suite against multiple pinned scikit-learn
# versions in parallel. Catches delegate-property breakage on
# CompositeTargetEstimator wrappers (feature_importances_, feature_names_in_,
# n_features_in_, get_booster, booster_) when sklearn renames attributes or
# changes validation behaviour across versions.
#
# Coverage of the wrapper / delegation / sklearn-API surface:
#   tests/training/test_composite.py
#   tests/training/test_composite_polish.py
#   tests/training/test_composite_polish_refinement.py
#   tests/training/test_composite_provenance.py
#   tests/training/test_composite_perf.py
#   tests/training/test_composite_business_value_locks.py
#   tests/training/test_composite_discovery.py
#   tests/training/test_composite_gate_and_edges.py
#   tests/training/test_composite_ensemble.py
#   tests/training/test_composite_x_feature_selection.py
#
# test_composite_integration.py is intentionally excluded: it exercises the
# full train_mlframe_models_suite (slow, orthogonal). Integration is covered
# by the general ci.yml workflow.

name: sklearn-matrix

on:
  push:
    branches: [master, main]
    paths:
      - "src/mlframe/training/composite.py"
      - "src/mlframe/training/composite_diagnostics.py"
      - "src/mlframe/training/configs.py"
      - "src/mlframe/training/baseline_diagnostics.py"
      - "tests/training/test_composite*.py"
      - "pyproject.toml"
      - ".github/workflows/sklearn-matrix-ci.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "src/mlframe/training/composite.py"
      - "src/mlframe/training/composite_diagnostics.py"
      - "src/mlframe/training/configs.py"
      - "src/mlframe/training/baseline_diagnostics.py"
      - "tests/training/test_composite*.py"
      - "pyproject.toml"
      - ".github/workflows/sklearn-matrix-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: sklearn ${{ matrix.sklearn-version }} on py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      # Persist numba's JIT cache (see the cache step below) so the heavy composite+FE tests (RFECV / MRMR /
      # BorutaShap -> composite) don't pay cold-compilation on top of model training and blow the per-test timeout.
      NUMBA_CACHE_DIR: ${{ github.workspace }}/.numba-cache
    # Force bash on every OS: the run steps below use bash backslash line-continuations, which the
    # windows-latest default shell (PowerShell) cannot parse (ParserError). Git Bash ships on the Windows runner.
    defaults:
      run:
        shell: bash
    # Newest-Python rows are non-blocking until the optional-extra ecosystem
    # finishes publishing cp314 wheels (see ci.yml for the same rationale).
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]
        # Active sklearn versions in production use. Exact pins make
        # breakage attributable to the specific minor. Floor is 1.6: category-encoders (a hard mlframe dep)
        # imports sklearn.utils.Tags, which only exists from 1.6, so sklearn 1.5 cannot import mlframe at all.
        sklearn-version:
          - "1.6.1"  # oldest supported; validation changes; LightGBM 4.5+ polars edge
          - "1.7.2"  # current most-installed across user base
          - "1.8.0"  # latest stable
        include:
          # Cross-Python: py3.13 catches sklearn-deprecation warnings under the
          # newest numpy ABI; only the latest sklearn is exercised (older sklearn
          # versions pre-date py3.13 wheel availability).
          - os: ubuntu-latest
            python-version: "3.13"
            sklearn-version: "1.8.0"
          # Newest Python (3.14) on the latest sklearn; experimental until the
          # composite-path optional extras publish cp314 wheels.
          - os: ubuntu-latest
            python-version: "3.14"
            sklearn-version: "1.8.0"
            experimental: true
          # Cross-OS: Windows on py3.11 + the most-installed sklearn catches
          # filesystem / signal-handling differences that surface in the composite
          # test suite (e.g. tempfile + joblib pickle on Windows).
          - os: windows-latest
            python-version: "3.11"
            sklearn-version: "1.7.2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Clone & install pyutilz (sibling dependency)
        # pyutilz is not on PyPI; install from GitHub with the narrow subset
        # of extras that mlframe transitively imports. Skip [nlp] -- spacy
        # forces thinc>=8.3.12 which requires Python>=3.10.
        run: |
          git clone --depth 1 https://github.com/fingoldo/pyutilz.git
          pip install "./pyutilz[system,pandas,polars,database]"

      - name: Install mlframe with runtime extras needed for composite tests
        # Composite-target tests transitively import most of mlframe's source
        # tree at collection time; several modules have unguarded top-level
        # imports of optional deps (calibration/viz/signal stacks). Installing
        # the union here avoids a treadmill of CI failures from one ImportError
        # at a time. Excludes [neural] (torch), [mlflow], [automl] which the
        # composite path doesn't touch. ``db`` is included for the
        # ``zstandard`` dep that ``mlframe.training.io`` (safe_pickle compression)
        # imports unconditionally; the sklearn-compliance harness fails at
        # collection without it.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[boosting,calibration,viz,signal,stats,sampling,unsupervised,polars_ext,db,dev]"

      - name: Pin scikit-learn to ${{ matrix.sklearn-version }}
        # --no-deps: swap ONLY scikit-learn to the pinned version. Without it, --force-reinstall re-resolves
        # scikit-learn's own deps and pulls numpy up to the latest (its numpy req is uncapped), blowing past
        # mlframe's numpy<2.5 cap -> numba 0.65.1 then rejects numpy 2.5 at import. Deps are already installed
        # by the editable install above, so --no-deps keeps the numpy 2.4.x the cap resolved.
        run: pip install --force-reinstall --no-deps "scikit-learn==${{ matrix.sklearn-version }}"

      - name: Restore numba JIT cache
        # Same persisted-cache pattern as ci.yml: numba recompiles kernels cold every run otherwise, and the
        # composite+FE tests trigger many kernels. restore-keys falls back to the newest prior cache (numba
        # invalidates per-kernel internally, so a stale restore still reuses unchanged kernels).
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.numba-cache
          key: numba-sklmatrix-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('src/**/*.py') }}
          restore-keys: |
            numba-sklmatrix-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Show installed versions
        run: |
          python -c "import sklearn; print('sklearn', sklearn.__version__)"
          python -c "import lightgbm; print('lightgbm', lightgbm.__version__)"
          python -c "import pydantic; print('pydantic', pydantic.__version__)"
          python -c "import numpy; print('numpy', numpy.__version__)"
          python -c "import mlframe; print('mlframe', mlframe.__version__)"

      - name: Composite-target test sweep
        # Selection by ``-m sklearn_matrix`` instead of an explicit file list -- each
        # composite-target test file carries ``pytestmark = pytest.mark.sklearn_matrix``
        # at module level. The meta-test
        # ``tests/test_meta/test_sklearn_matrix_marker_invariants.py`` pins the
        # convention so new composite_*.py files cannot silently miss the matrix.
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest tests/training/ -m sklearn_matrix \
            --no-cov \
            -p no:randomly \
            --timeout=300 \
            -v

      - name: Sklearn-compliance harness
        # Runs sklearn.utils.estimator_checks against every wrapper class
        # (CompositeTargetEstimator, _LagPredictDeployableModel,
        # ESTransformedTargetRegressor, EstimatorWithEarlyStopping, RFECV
        # wrapper, PdOrdinalEncoder, PdKBinsDiscretizer). xfail_strict from
        # pyproject means version-specific incompatibilities documented in
        # the test file trip if they silently start passing on a newer
        # sklearn -- catches both regressions and accidental "fixes".
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest \
            tests/test_sklearn_compliance.py \
            tests/test_sklearn_compliance_composite.py \
            --no-cov \
            -p no:randomly \
            --timeout=300 \
            -v
